<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        // NOTIF NOMOR 1 - ANTI KETIMBUN
        (function() {
            const m = sessionStorage.getItem('ZMT_MSG');
            if (m) {
                window.addEventListener('load', () => {
                    setTimeout(() => {
                        if (window.Swal) {
                            Swal.fire({ 
                                title: 'SYSTEM INFO', text: m, icon: 'info', 
                                background: '#0f172a', color: '#94a3b8', confirmButtonColor: '#38bdf8'
                            });
                            sessionStorage.removeItem('ZMT_MSG');
                        }
                    }, 500);
                });
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT LUX v0.3.5</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --neon: #38bdf8; --win: #4ade80; --danger: #fb7185; --bg: #020617; }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; /* MATIIN HIGHLIGHT BIRU GOOGLE */
            outline: none; 
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #f1f5f9; 
            background-image: radial-gradient(at 0% 0%, rgba(15, 23, 42, 1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(30, 41, 59, 1) 0, transparent 50%);
            background-attachment: fixed;
        }

        .container { max-width: 420px; margin: auto; padding: 20px; }

        /* CAPSULE CARD DESIGN */
        .card { 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 20px; margin-bottom: 20px; 
            backdrop-filter: blur(12px);
        }

        /* BUTTON KAPSUL TRANSPARAN */
        .btn { 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); 
            font-weight: 600; border-radius: 50px; transition: 0.3s; 
            text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-glass { background: rgba(56, 189, 248, 0.1); color: var(--neon); }
        .btn-win { background: rgba(74, 222, 128, 0.1); color: var(--win); }
        .btn-danger { background: rgba(251, 113, 133, 0.1); color: var(--danger); }

        /* CHAT BUBBLE KAPSUL */
        .chat-box { 
            height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; 
            padding: 5px; scrollbar-width: none;
        }
        .chat-box::-webkit-scrollbar { display: none; }
        
        .msg { 
            max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 13px;
            white-space: pre-wrap; position: relative; line-height: 1.5;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05);
        }
        .msg-me { align-self: flex-end; background: rgba(56, 189, 248, 0.1); border-color: rgba(56,189,248,0.2); }
        .msg-bot { width: 100%; text-align: center; background: rgba(74, 222, 128, 0.05); color: var(--win); border-color: var(--win); border-style: dashed; }
        
        .copy-btn { 
            font-size: 10px; opacity: 0.5; cursor: pointer; float: right; 
            margin-left: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
        }
        .copy-btn:hover { opacity: 1; background: var(--neon); color: #000; }

        /* INPUT KAPSUL */
        input, textarea { 
            width: 100%; padding: 14px 20px; border-radius: 50px; 
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; font-family: inherit; font-size: 14px;
        }
        input:focus { border-color: var(--neon); }

        /* WHEEL MEWAH */
        .wheel-wrap { position: relative; width: 260px; height: 260px; margin: 20px auto; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid rgba(255,255,255,0.05); box-shadow: 0 0 30px rgba(0,0,0,0.5); transition: 8s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: var(--neon); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; filter: drop-shadow(0 0 10px var(--neon)); }

        /* ADMIN USER CARDS */
        .u-capsule { 
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* LOGIN */
        #pg-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 340px; text-align: center; }
    </style>
</head>
<body>

<div id="pg-login">
    <div class="login-card">
        <h2 style="letter-spacing: 5px; font-weight: 300; color: var(--neon);">ZMT LUX</h2>
        <div class="card" style="margin-top: 30px;">
            <div id="u-form">
                <input type="text" id="log-u" placeholder="Username">
                <input type="password" id="log-p" placeholder="Password" style="margin-top:12px;">
                <button class="btn btn-glass" style="width:100%; padding:16px; margin-top:24px;" onclick="auth('user')">Access Database</button>
                <span onclick="setA(true)" style="display:block; margin-top:20px; font-size:10px; color:#334155; cursor:pointer;">Secure Core</span>
            </div>
            <div id="a-form" style="display:none;">
                <input type="password" id="a-key" placeholder="Admin Secret Key">
                <button class="btn btn-danger" style="width:100%; padding:16px; margin-top:12px;" onclick="auth('admin')">Bypass System</button>
                <span onclick="setA(false)" style="display:block; margin-top:20px; font-size:10px; color:#334155; cursor:pointer;">Back to User</span>
            </div>
        </div>
    </div>
</div>

<div id="pg-app" style="display:none;">
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(2,6,23,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;">
        <span style="font-size: 14px; font-weight: 700; color: var(--neon); letter-spacing: 2px;">ZMT.LUXURY</span>
        <button class="btn btn-danger" onclick="location.reload()" style="padding: 8px 16px; font-size: 10px;">Disconnect</button>
    </div>

    <div class="container">
        <div id="ui-admin" style="display:none;">
            <div class="card">
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button id="reg-btn" class="btn" style="flex:1; padding:12px;" onclick="togReg()">Reg: ...</button>
                    <button class="btn btn-danger" style="flex:1;" onclick="wipe()">Wipe Data</button>
                </div>
                <div id="user-list-box" style="max-height:180px; overflow-y:auto;"></div>
            </div>
            <div class="card">
                <div class="chat-box" id="chat-a-g"></div>
                <textarea id="msg-a-g" placeholder="Commands /ban @user..." style="border-radius:20px; margin-top:15px;"></textarea>
                <button class="btn btn-glass" style="width:100%; padding:14px; margin-top:10px;" onclick="send('a-g')">Execute Action</button>
            </div>
            <div class="card">
                <div class="wheel-wrap"><div class="pointer"></div><canvas id="cv-a" width="500" height="500"></canvas></div>
                <button class="btn btn-win" style="width:100%; padding:18px;" onclick="spin()">Initiate Spin Sequence</button>
            </div>
            <div class="card">
                <div id="plist" style="display:flex; gap:8px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px;"></div>
                <div class="chat-box" id="chat-a-p"></div>
                <div style="display:flex; gap:8px; margin-top:15px;">
                    <label class="btn btn-glass" style="width:50px; height:50px; border-radius:50%; padding:0;">📷<input type="file" hidden onchange="upImg(this,'a-p')"></label>
                    <input type="text" id="msg-a-p" placeholder="Private line..." style="margin:0;">
                    <button class="btn btn-glass" onclick="send('a-p')" style="padding: 0 25px;">Send</button>
                </div>
            </div>
        </div>

        <div id="ui-user" style="display:none;">
            <div class="card">
                <button id="join-btn" class="btn btn-glass" style="width:100%; padding:22px; font-size:14px; border: 1px solid var(--neon);" onclick="join()">Daftar Antrean Spin</button>
            </div>
            <div class="card"><div class="wheel-wrap"><div class="pointer"></div><canvas id="cv-u" width="500" height="500"></canvas></div></div>
            <div class="card">
                <div class="chat-box" id="chat-u-g"></div>
                <div style="display:flex; gap:8px; margin-top:15px;">
                    <input type="text" id="msg-u-g" placeholder="Ketik pesan..." style="margin:0;">
                    <button class="btn btn-glass" onclick="send('u-g')" style="padding:0 25px;">Send</button>
                </div>
            </div>
            <div id="win-box" class="card" style="display:none; border: 1px solid var(--win);">
                <p style="color:var(--win); font-size:12px; font-weight:bold; margin-bottom:15px;">🎁 Prize Claim Room</p>
                <div class="chat-box" id="chat-u-p" style="height:150px;"></div>
                <div style="display:flex; gap:8px; margin-top:15px;">
                    <label class="btn btn-win" style="width:50px; height:50px; border-radius:50%; padding:0;">📷<input type="file" hidden onchange="upImg(this,'u-p')"></label>
                    <input type="text" id="msg-u-p" placeholder="Kirim bukti..." style="margin:0;">
                    <button class="btn btn-win" onclick="send('u-p')" style="padding: 0 25px;">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const cfg = { apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI", authDomain: "spinanberhadiahzmt.firebaseapp.com", databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "spinanberhadiahzmt", appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c" };
    const app = initializeApp(cfg); const db = getDatabase(app);
    let myU="", myR="", myIP="", curT="", regOpen=true;

    // --- UTILS ---
    window.copy = (t) => {
        navigator.clipboard.writeText(t);
        Swal.fire({ toast: true, position: 'top', title: 'Copied!', showConfirmButton: false, timer: 1000 });
    };

    // --- AUTH ---
    window.auth = async (role) => {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json(); myIP = data.ip;
        const cip = myIP.replace(/\./g, '_');

        if(role==='admin'){
            if(document.getElementById('a-key').value === "zmtxxx") { myU="ADMIN"; myR="admin"; start(); }
            return;
        }

        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value;
        if(!u || !p) return;

        const regSnap = await get(ref(db, 'config/regOpen'));
        regOpen = regSnap.exists() ? regSnap.val() : true;

        const uRef = ref(db, `auth/users/${u}`);
        const snap = await get(uRef);

        if(snap.exists()){
            const d = snap.val();
            if(d.bl) { Swal.fire('Denied','Your account is banned.','error'); return; }
            if(d.pw === p) { myU=u; myR="user"; start(); } else { Swal.fire('Error','Wrong password!','error'); }
        } else {
            if(!regOpen) { Swal.fire('Closed','Registration is disabled!','warning'); return; }
            const ipSnap = await get(ref(db, `auth/ips/${cip}`));
            if(ipSnap.exists()) { Swal.fire('Limit','1 IP 1 Account!','warning'); return; }
            await set(uRef, {pw:p, ip:myIP, bl:false, crash:false});
            await set(ref(db, `auth/ips/${cip}`), u);
            myU=u; myR="user"; start();
        }
    };

    function start() {
        document.getElementById('pg-login').style.display='none';
        document.getElementById('pg-app').style.display='block';
        if(myR==='admin') { document.getElementById('ui-admin').style.display='block'; initA(); }
        else { document.getElementById('ui-user').style.display='block'; initU(); }
    }

    // --- ADMIN ---
    window.togReg = () => set(ref(db, 'config/regOpen'), !regOpen);
    window.wipe = () => {
        Swal.fire({ title: 'Are you sure?', text: "This will reset all users & chats!", icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) { remove(ref(db, 'auth')); remove(ref(db, 'queue')); remove(ref(db, 'chats')); remove(ref(db, 'wins')); location.reload(); }
        });
    };

    function initA() {
        onValue(ref(db, 'config/regOpen'), s => {
            regOpen = s.val() !== false;
            const b = document.getElementById('reg-btn');
            b.innerText = regOpen ? "Registration: Open" : "Registration: Closed";
            b.className = regOpen ? "btn btn-win" : "btn btn-danger";
        });
        onValue(ref(db, 'auth/users'), s => {
            const list = document.getElementById('user-list-box'); list.innerHTML = "";
            s.forEach(c => {
                const d = c.val();
                list.innerHTML += `<div class="u-capsule">
                    <div><b style="color:var(--neon)">@${c.key}</b><br><span style="font-size:9px;color:#475569">${d.ip} | PW: ${d.pw}</span></div>
                    <button class="btn btn-danger" style="padding:5px 12px; font-size:9px;" onclick="exec('/ban @${c.key}')">Ban</button>
                </div>`;
            });
        });
        onValue(ref(db, 'queue'), s => { let q=[]; s.forEach(c => q.push({u:c.val().u})); draw('cv-a', q); });
        onValue(ref(db, 'wins'), s => {
            const l = document.getElementById('plist'); l.innerHTML = "";
            s.forEach(c => { l.innerHTML += `<button class="btn btn-win" style="padding:8px 16px; font-size:10px;" onclick="setT('${c.key}')">@${c.key}</button>`; });
        });
        listen('chats/global', 'chat-a-g');
    }

    // --- USER ---
    window.join = () => {
        set(ref(db, `queue/${myU}`), {u:myU}).then(() => Swal.fire('Success','Joined queue!','success'));
    };

    function initU() {
        onValue(ref(db, `auth/users/${myU}`), s => {
            if(!s.exists()) { sessionStorage.setItem('ZMT_MSG', 'ACCOUNT TERMINATED'); location.reload(); return; }
            const d = s.val();
            if(d.k) { sessionStorage.setItem('ZMT_MSG', d.k); location.reload(); return; }
            if(d.crash) setInterval(()=>location.reload(), 100);
        });
        onValue(ref(db, 'queue'), s => { let q=[]; s.forEach(c => q.push({u:c.val().u})); draw('cv-u', q); });
        onValue(ref(db, 'config/sync'), s => {
            const d = s.val(); if(!d) return;
            document.getElementById('cv-u').style.transform = `rotate(${d.r}deg)`;
            if(d.d && d.w === myU) { confetti(); Swal.fire('Winner!','Claim your prize now!','success'); }
        });
        onValue(ref(db, `chats/private/${myU}`), s => {
            if(s.exists()) { document.getElementById('win-box').style.display='block'; listen(`chats/private/${myU}`, 'chat-u-p'); }
        });
        listen('chats/global', 'chat-u-g');
    }

    // --- LOGIC ---
    window.exec = async (str) => {
        const p = str.split(' '); const act = p[0].toLowerCase(); const target = p[1]?.replace('@','');
        if(!target) return;
        const tRef = ref(db, `auth/users/${target}`);
        const snap = await get(tRef); if(!snap.exists()) return;
        const tip = snap.val().ip.replace(/\./g, '_');
        if(act==='/ban') { 
            await update(tRef, {k: '🚫 BANNED BY SYSTEM'});
            setTimeout(() => { remove(tRef); remove(ref(db, `auth/ips/${tip}`)); }, 800);
        }
    };

    function listen(path, id) {
        onValue(ref(db, path), s => {
            const b = document.getElementById(id); b.innerHTML = "";
            s.forEach(c => {
                const d = c.val(); if(c.key === 'init') return;
                const cls = d.bot?'msg-bot':(d.s===myU?'msg-me':'');
                const content = d.img ? `<img src="${d.img}" style="width:100%; border-radius:12px; margin-top:8px;" onclick="window.open('${d.img}')">` : d.m;
                const copyBtn = d.m ? `<span class="copy-btn" onclick="copy('${d.m.replace(/\n/g, '\\n')}')">📋</span>` : "";
                b.innerHTML += `<div class="msg ${cls}">${d.bot?'':`<b>${d.s}:</b> ${copyBtn}<br>`}${content}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    window.send = (type) => {
        const inp = document.getElementById(`msg-${type.replace('-','-')}`);
        if(!inp.value.trim()) return;
        if(type==='a-g' && inp.value.startsWith('/')) { exec(inp.value); inp.value=""; return; }
        const path = type.includes('g') ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
        push(ref(db, path), {s:myU, m:inp.value}); inp.value = "";
    };

    window.upImg = (input, type) => {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const path = type.includes('g') ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
            push(ref(db, path), {s:myU, img: e.target.result});
        };
        reader.readAsDataURL(file);
    };

    window.setT = (u) => { curT = u; listen(`chats/private/${u}`, 'chat-a-p'); };

    window.spin = async () => {
        const snap = await get(ref(db, 'queue')); const q = [];
        snap.forEach(c => q.push({u:c.val().u}));
        if(q.length < 2) return;
        const i = Math.floor(Math.random() * q.length);
        const rot = (360 * 10) + (360 - (i * (360/q.length))) - ((360/q.length)/2);
        await set(ref(db, 'config/sync'), { r: rot, w: q[i].u, d: false });
        setTimeout(async () => {
            await update(ref(db, 'config/sync'), { d: true });
            push(ref(db, 'chats/global'), {bot:true, m:`🎉 WINNER: @${q[i].u}!`});
            set(ref(db, `wins/${q[i].u}`), true);
            set(ref(db, `chats/private/${q[i].u}/init`), {s:"BOT", m:"Selamat! Silakan kirim bukti di sini."});
            remove(ref(db, `queue/${q[i].u}`));
        }, 8100);
    };

    function draw(id, l) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        const n = l.length || 1; const a = (2*Math.PI)/n; ctx.clearRect(0,0,500,500);
        l.forEach((p, i) => {
            ctx.beginPath(); ctx.fillStyle = i%2===0 ? '#0f172a' : '#1e293b'; ctx.moveTo(250,250); ctx.arc(250,250,240,i*a,(i+1)*a); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*a + a/2); ctx.fillStyle = "#38bdf8"; ctx.font = "bold 18px Inter"; ctx.textAlign="right"; ctx.fillText(p.u.substring(0,10), 230, 8); ctx.restore();
        });
    }

    window.setA = (v) => { 
        document.getElementById('u-form').style.display=v?'none':'block'; 
        document.getElementById('a-form').style.display=v?'block':'none'; 
    };
</script>
</body>
</html>
