<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT EVENT - v.0.1.4</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #8b5cf6; --g: #fbbf24; --d: #020308; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.12); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--d); color: #fff; overflow-x: hidden; min-height: 100vh; }
        .nebula { position: fixed; inset: 0; z-index: -1; background: #020308; }
        .vapor { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; }
        .v1 { width: 400px; height: 400px; background: #4f46e5; top: -10%; left: -10%; }
        .v2 { width: 350px; height: 350px; background: #9333ea; bottom: -10%; right: -5%; }
        .capsule-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 25px; padding: 20px; margin-bottom: 15px; }
        .btn-capsule { width: 100%; padding: 14px; border-radius: 999px; border: none; color: #fff; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-p { background: linear-gradient(135deg, #6366f1, #a855f7); }
        .btn-p:active { transform: scale(0.96); }
        .marquee-container { background: rgba(0,0,0,0.5); border-radius: 999px; padding: 10px; border: 1px solid var(--border); color: var(--g); overflow: hidden; margin-bottom: 15px; }
        .marquee-text { display: inline-block; white-space: nowrap; animation: run 15s linear infinite; padding-left: 100%; font-weight: 800; font-size: 13px; }
        @keyframes run { from { transform: translateX(0); } to { transform: translateX(-200%); } }
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        canvas { width: 100%; height: 100%; border-radius: 50%; transition: 6s cubic-bezier(0.1, 0, 0.1, 1); border: 6px solid var(--glass); }
        .needle { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 35px; height: 45px; background: #ff4757; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; border: 2px solid #fff; }
        .chat-box { height: 230px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--border); }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 13px; max-width: 85%; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .me { background: var(--p); align-self: flex-end; border-bottom-right-radius: 4px; }
        .other { background: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        textarea, input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 12px 20px; color: #fff; border-radius: 20px; outline: none; }
        .win-badge { display: inline-block; padding: 6px 14px; background: rgba(251, 191, 36, 0.1); border: 1px solid var(--g); color: var(--g); border-radius: 99px; font-size: 11px; font-weight: 800; margin: 4px; cursor: pointer; }
        .acc-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; }
    </style>
</head>
<body>
<div class="nebula"><div class="vapor v1"></div><div class="vapor v2"></div></div>

<div id="gate" style="position:fixed; inset:0; z-index:1000; background:#020308; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="capsule-card" style="width:100%; max-width:350px; text-align:center;">
        <h2 style="color:var(--p); margin:0;">ZMT EVENT</h2>
        <p style="font-size:10px; opacity:0.4; margin-bottom:20px;">v.0.1.4</p>
        <div id="uLogin">
            <input type="text" id="uIn" placeholder="Username" style="margin-bottom:10px;">
            <input type="password" id="pIn" placeholder="Password" style="margin-bottom:15px;">
            <button class="btn-capsule btn-p" onclick="doAuth('user')">MASUK</button>
            <p onclick="toggleGate()" style="font-size:11px; margin-top:20px; opacity:0.2; cursor:pointer;">Admin Portal</p>
        </div>
        <div id="aLogin" style="display:none;">
            <input type="password" id="aKey" placeholder="Master Key">
            <button class="btn-capsule" style="background:var(--g); color:#000; margin-top:10px;" onclick="doAuth('admin')">LOGIN ADMIN</button>
            <p onclick="toggleGate()" style="font-size:11px; margin-top:20px; opacity:0.2; cursor:pointer;">Kembali</p>
        </div>
    </div>
</div>

<div id="app" style="display:none; padding:15px; max-width:500px; margin:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span style="color:var(--g); font-weight:800;">ZMT ENGINE</span>
        <div style="text-align:right;">
            <div id="userDisplay" style="font-size:11px; font-weight:800; color:var(--p);"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:#ff4757; font-size:10px; font-weight:800; cursor:pointer;">LOGOUT</button>
        </div>
    </div>
    <div class="marquee-container"><div class="marquee-text" id="mq">SISTEM AKTIF...</div></div>

    <div id="uiUser" style="display:none;">
        <div class="capsule-card"><button class="btn-capsule btn-p" id="joinBtn" onclick="join()">DAFTAR SPIN</button></div>
        <div class="capsule-card" style="text-align:center;">
            <div class="wheel-box"><div class="needle"></div><canvas id="wUser" width="500" height="500"></canvas></div>
            <p id="spinStatus" style="font-size:11px; color:var(--g); font-weight:800;">MENUNGGU ADMIN...</p>
        </div>
        <div class="capsule-card">
            <h4 style="margin:0 0 10px 0; color:var(--g); text-align:center;">🏆 HALL OF FAME</h4>
            <div id="userWinList" style="text-align:center;"></div>
        </div>
        <div id="winArea" class="capsule-card" style="display:none; border:2px solid var(--g);">
            <h4 style="color:var(--g); text-align:center;">ANDA MENANG! CHAT ADMIN:</h4>
            <div id="boxUser" class="chat-box"></div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <textarea id="msgUser" rows="2" placeholder="Tulis pesan..."></textarea>
                <button class="btn-capsule btn-p" style="width:70px;" onclick="send('user')">KIRIM</button>
            </div>
        </div>
    </div>

    <div id="uiAdmin" style="display:none;">
        <div class="capsule-card">
            <input type="text" placeholder="Running Text..." onchange="updateDB('config/marquee', this.value)" style="margin-bottom:10px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn-capsule" style="background:#10b981;" onclick="updateDB('config/reg', true)">BUKA REG</button>
                <button class="btn-capsule" style="background:#ef4444;" onclick="updateDB('config/reg', false)">TUTUP REG</button>
            </div>
        </div>
        <div class="capsule-card" style="text-align:center;">
            <div class="wheel-box"><div class="needle"></div><canvas id="wAdmin" width="500" height="500"></canvas></div>
            <button class="btn-capsule btn-p" onclick="spinMaster()">MULAI SPIN</button>
        </div>
        <div class="capsule-card">
            <h4>👥 LIST AKUN & PASSWORD</h4>
            <div id="adminUserList" style="max-height:100px; overflow-y:auto; background:rgba(0,0,0,0.2); border-radius:10px;"></div>
        </div>
        <div class="capsule-card">
            <h4>💬 CHAT PEMENANG</h4>
            <div id="adminWinList"></div>
            <div id="adminChat" style="display:none; margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">
                <b id="targetU" style="color:var(--g)"></b>
                <div id="boxAdmin" class="chat-box" style="margin:10px 0;"></div>
                <div style="display:flex; gap:8px;">
                    <textarea id="msgAdmin" rows="1" placeholder="Balas..."></textarea>
                    <button class="btn-capsule btn-p" style="width:70px;" onclick="send('admin')">KIRIM</button>
                </div>
            </div>
        </div>
        <div class="capsule-card" style="border:1px solid #ef4444;">
            <button class="btn-capsule" style="background:#ef4444;" onclick="nuclearReset()">☢️ RESET SEMUA DATA</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";
    const cfg = { apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI", authDomain: "spinanberhadiahzmt.firebaseapp.com", databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "spinanberhadiahzmt", appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c" };
    const app = initializeApp(cfg); const db = getDatabase(app);
    let myID = ""; let myRole = ""; let items = []; let curChat = ""; let currentRot = 0;

    // --- REALTIME SYNC ---
    onValue(ref(db, 'config/syncSpin'), (s) => {
        const d = s.val(); if(!d || myRole !== 'user') return;
        document.getElementById('wUser').style.transform = `rotate(${d.rot - 90}deg)`;
        document.getElementById('spinStatus').innerText = d.done ? "HASIL KELUAR!" : "SEDANG BERPUTAR...";
        if(d.done && d.winner === myID) setTimeout(() => { confetti(); }, 6000);
    });

    onValue(ref(db, 'config'), (s) => {
        const c = s.val(); if(!c) return;
        if(c.marquee) document.getElementById('mq').innerText = c.marquee;
        if(c.reset === true) location.reload();
    });

    // --- AUTH ---
    window.doAuth = async (role) => {
        if(role === 'admin') {
            if(document.getElementById('aKey').value === "zmtxxx") { myID="ADMIN"; myRole="admin"; start(); }
            else Swal.fire("Key Salah!");
        } else {
            const u = document.getElementById('uIn').value.trim();
            const p = document.getElementById('pIn').value;
            if(!u || !p) return Swal.fire("Lengkapi data!");
            const uRef = ref(db, `auth/users/${u}`);
            const snap = await get(uRef);
            if(snap.exists() && snap.val().pw !== p) return Swal.fire("Password Salah!");
            if(!snap.exists()) await set(uRef, {pw: p});
            myID = u; myRole = "user"; start();
        }
    };

    function start() {
        document.getElementById('gate').style.display='none'; document.getElementById('app').style.display='block';
        document.getElementById('userDisplay').innerText = "@" + myID;
        if(myRole==='admin') { document.getElementById('uiAdmin').style.display='block'; initAdmin(); }
        else { document.getElementById('uiUser').style.display='block'; initUser(); }
    }

    window.updateDB = (p, v) => set(ref(db, p), v);

    // --- RESET SEMUA DATA ---
    window.nuclearReset = async () => {
        const res = await Swal.fire({ title: 'HAPUS SEMUA DATA?', icon: 'warning', showCancelButton: true });
        if(res.isConfirmed) {
            await set(ref(db, 'config/reset'), true);
            await remove(ref(db, 'q')); await remove(ref(db, 'wins')); await remove(ref(db, 'chats')); await remove(ref(db, 'auth/users'));
            await set(ref(db, 'config/reset'), false); location.reload();
        }
    };

    // --- ADMIN LOGIC ---
    function initAdmin() {
        onValue(ref(db, 'q'), (s) => { items = []; s.forEach(c => { items.push({u:c.val().u, k:c.key}); }); drawWheel('wAdmin'); });
        onValue(ref(db, 'wins'), (s) => {
            let h = ""; s.forEach(c => { h += `<span class="win-badge" onclick="openChat('${c.val().u}')">@${c.val().u}</span>`; });
            document.getElementById('adminWinList').innerHTML = h || "Belum ada pemenang";
        });
        onValue(ref(db, 'auth/users'), (s) => {
            let h = ""; s.forEach(c => { h += `<div class="acc-row"><span><b>${c.key}</b></span><span>PW: ${c.val().pw}</span></div>`; });
            document.getElementById('adminUserList').innerHTML = h || "Kosong";
        });
    }

    window.spinMaster = async () => {
        if(items.length < 2) return Swal.fire("Minimal 2 orang!");
        const winIdx = Math.floor(Math.random() * items.length);
        const win = items[winIdx];
        const arc = 360 / items.length;
        const stopAt = (360 - (winIdx * arc)) - (arc / 2);
        const finalRot = currentRot + 3600 + (stopAt - (currentRot % 360));
        currentRot = finalRot;

        await set(ref(db, 'config/syncSpin'), { active: true, rot: finalRot, winner: win.u, done: false });
        document.getElementById('wAdmin').style.transform = `rotate(${finalRot - 90}deg)`;
        setTimeout(async () => {
            await set(ref(db, 'config/syncSpin/done'), true);
            await push(ref(db, 'wins'), {u: win.u});
            await remove(ref(db, `q/${win.k}`));
        }, 6500);
    };

    // --- USER LOGIC ---
    window.join = () => { push(ref(db, 'q'), {u: myID}); Swal.fire({title:"Berhasil Daftar!", icon:"success", timer:700}); };
    
    function initUser() {
        onValue(ref(db, 'q'), (s) => {
            items = []; let j = false; s.forEach(c => { items.push({u:c.val().u}); if(c.val().u === myID) j = true; });
            document.getElementById('joinBtn').innerText = j ? "DAFTAR BERHASIL ✅" : "DAFTAR SPIN";
            document.getElementById('joinBtn').disabled = j;
            drawWheel('wUser');
        });
        onValue(ref(db, 'wins'), (s) => {
            let isMe = false; let h = ""; 
            s.forEach(c => { if(c.val().u === myID) isMe = true; h += `<span class="win-badge">@${c.val().u}</span>`; });
            document.getElementById('userWinList').innerHTML = h || "Menunggu pemenang...";
            document.getElementById('winArea').style.display = isMe ? 'block' : 'none';
            if(isMe) listenChat(myID, 'boxUser');
        });
    }

    // --- TOOLS ---
    window.drawWheel = (id) => {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        const n = items.length || 1; const arc = (2*Math.PI)/n; ctx.clearRect(0,0,500,500);
        items.forEach((it, i) => {
            ctx.beginPath(); ctx.fillStyle = `hsl(${i*(360/n)}, 70%, 50%)`;
            ctx.moveTo(250,250); ctx.arc(250,250,245,i*arc,(i+1)*arc); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc + arc/2);
            ctx.fillStyle="#fff"; ctx.font="bold 25px Sans"; ctx.textAlign="right"; ctx.fillText(it.u.substring(0,8), 230, 10); ctx.restore();
        });
    };

    window.openChat = (u) => { curChat=u; document.getElementById('adminChat').style.display='block'; document.getElementById('targetU').innerText="Chat: @"+u; listenChat(u, 'boxAdmin'); };
    
    function listenChat(u, bId) {
        onValue(ref(db, `chats/${u}`), (s) => {
            const b = document.getElementById(bId); if(!b) return;
            b.innerHTML = "";
            if(s.exists()) s.forEach(c => { if(c.val() && c.val().t) b.innerHTML += `<div class="msg ${c.val().s===myID?'me':'other'}">${c.val().t}</div>`; });
            b.scrollTop = b.scrollHeight;
        });
    }

    window.send = async (r) => {
        const t = (r === 'admin') ? curChat : myID; 
        const inp = document.getElementById(r==='admin'?'msgAdmin':'msgUser');
        const val = inp.value.trim(); if(!val) return;
        await push(ref(db, `chats/${t}`), { s: myID, t: val }); inp.value = "";
    };

    window.toggleGate = () => { document.getElementById('uLogin').style.display = document.getElementById('uLogin').style.display === 'none' ? 'block' : 'none'; document.getElementById('aLogin').style.display = document.getElementById('aLogin').style.display === 'none' ? 'block' : 'none'; };
</script>
</body>
    </html>
