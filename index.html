<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT EVENT - DARK NEBULA</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #7c3aed; --g: #fbbf24; --d: #050505; --r: #ff4757; --glass: rgba(15, 15, 15, 0.85); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--d); color: #eee; overflow-x: hidden; min-height: 100vh; }

        /* REAL CUSTOM NEBULA BG */
        .nebula-container { position: fixed; inset: 0; z-index: -1; background: #000; overflow: hidden; }
        .vapor { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(100px); opacity: 0.4; animation: drift 25s infinite alternate; }
        .v1 { background: radial-gradient(circle, #4f46e5, transparent); top: -10%; left: -10%; }
        .v2 { background: radial-gradient(circle, #702283, transparent); bottom: -10%; right: -10%; animation-delay: -7s; }
        .v3 { background: radial-gradient(circle, #1e3a8a, transparent); top: 40%; left: 20%; animation-duration: 35s; }
        @keyframes drift { from { transform: translate(0,0) scale(1) rotate(0deg); } to { transform: translate(150px, 100px) scale(1.3) rotate(90deg); } }

        /* UI ELEMENTS - ANTI GOOGLE STYLE */
        .zmt-card { background: var(--glass); border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(15px); }
        .header-title { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 5px; color: var(--p); text-shadow: 0 0 15px var(--p); }
        
        input { width: 100%; background: #111; border: 1px solid #333; padding: 15px; color: #fff; border-radius: 4px; margin: 10px 0; font-weight: bold; }
        input:focus { border-color: var(--p); box-shadow: 0 0 10px rgba(124, 58, 237, 0.3); }
        
        .z-btn { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .z-btn-p { background: var(--p); color: #fff; box-shadow: 0 5px 0 #5b21b6; }
        .z-btn-p:active { transform: translateY(3px); box-shadow: 0 2px 0 #5b21b6; }
        .z-btn-danger { background: var(--r); color: #fff; font-size: 11px; padding: 8px; }

        .marquee-zmt { background: #111; border-top: 2px solid var(--p); border-bottom: 2px solid var(--p); padding: 10px; margin: 20px 0; font-weight: 900; color: var(--g); overflow: hidden; }
        .mq-inner { display: inline-block; white-space: nowrap; animation: slide 20s linear infinite; }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* WHEEL CUSTOM */
        .wheel-box { position: relative; width: 300px; height: 300px; margin: 30px auto; border: 10px solid #111; border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,1); }
        canvas { width: 100%; height: 100%; border-radius: 50%; transition: 6s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 40px; height: 50px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        .online-tag { background: #000; border: 1px solid var(--succ); color: var(--succ); padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .chat-msg { padding: 10px; border-radius: 4px; margin-bottom: 8px; font-size: 13px; max-width: 85%; }
        .me { background: var(--p); margin-left: auto; color: white; }
        .other { background: #222; color: #ccc; }
    </style>
</head>
<body>

<div class="nebula-container">
    <div class="vapor v1"></div><div class="vapor v2"></div><div class="vapor v3"></div>
</div>

<div id="gate" style="position:fixed; inset:0; z-index:1000; background:#000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="zmt-card" style="width:100%; max-width:400px; text-align:center;">
        <h1 class="header-title">ZMT EVENT</h1>
        <div id="loginBox">
            <input type="text" id="uIn" placeholder="USERNAME">
            <input type="password" id="pIn" placeholder="PASSWORD">
            <button class="z-btn z-btn-p" onclick="login('user')">ENTER NEBULA</button>
            <p onclick="toggleGate()" style="margin-top:20px; font-size:10px; cursor:pointer; opacity:0.5;">ADMIN SECURE LOGIN</p>
        </div>
        <div id="adminLoginBox" style="display:none;">
            <input type="password" id="aKey" placeholder="ADMIN SECRET KEY">
            <button class="z-btn z-btn-p" style="background:var(--g); color:#000;" onclick="login('admin')">VERIFY MASTER</button>
            <p onclick="toggleGate()" style="margin-top:20px; font-size:10px; cursor:pointer; opacity:0.5;">BACK TO USER</p>
        </div>
    </div>
</div>

<div id="app" style="display:none; padding:15px; max-width:600px; margin:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div class="online-tag">🟢 <span id="onlineVal">0</span> ONLINE</div>
        <button onclick="logout()" style="background:none; border:1px solid var(--r); color:var(--r); padding:5px 15px; font-size:10px; font-weight:900;">LOGOUT</button>
    </div>

    <div class="marquee-zmt"><div class="mq-inner" id="mqText">WELCOME TO ZMT EVENT DARK NEBULA ENGINE...</div></div>

    <div id="uiAdmin" style="display:none;">
        <div class="zmt-card">
            <h3 style="margin:0 0 15px 0;">MASTER CONTROL</h3>
            <input type="text" placeholder="GANTI RUNNING TEXT..." onchange="setMarquee(this.value)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <button class="z-btn" style="background:var(--succ); color:#fff;" onclick="setReg(true)">OPEN REG</button>
                <button class="z-btn" style="background:var(--r); color:#fff;" onclick="setReg(false)">CLOSE REG</button>
            </div>
            <button class="z-btn" style="margin-top:10px; background:#444; color:#fff;" onclick="clearRoda()">🧹 RESET SEMUA PESERTA</button>
        </div>
        
        <div class="zmt-card" style="text-align:center;">
            <div class="wheel-box"><div class="pointer"></div><canvas id="wheel" width="500" height="500"></canvas></div>
            <button class="z-btn z-btn-p" id="spinBtn" onclick="spinNow()">SPIN NEBULA</button>
        </div>

        <div class="zmt-card">
            <h3>QUEUE (@<span id="qCount">0</span>)</h3>
            <div id="queueList" style="max-height:200px; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="uiUser" style="display:none;">
        <div id="regArea" class="zmt-card">
            <button class="z-btn z-btn-p" id="joinBtn" onclick="join()">JOIN SPIN</button>
        </div>
        <div class="zmt-card" style="text-align:center;">
            <div class="wheel-box"><div class="pointer"></div><canvas id="wheelUser" width="500" height="500"></canvas></div>
        </div>
        <div id="winArea" class="zmt-card" style="display:none; border:2px solid var(--g);">
            <h2 style="color:var(--g); text-align:center;">YOU WIN! CHAT ADMIN</h2>
            <div id="chatUser" style="height:200px; overflow-y:auto; padding:10px; background:#000; margin-bottom:10px;"></div>
            <div style="display:flex; gap:5px;"><input type="text" id="mInUser" placeholder="Pesan..."><button class="z-btn z-btn-p" style="width:80px;" onclick="send('user')">SEND</button></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, onDisconnect } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const cfg = {
        apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI",
        authDomain: "spinanberhadiahzmt.firebaseapp.com",
        databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "spinanberhadiahzmt",
        appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c"
    };

    const app = initializeApp(cfg);
    const db = getDatabase(app);
    let myID = ""; let items = []; let rot = 0; let isRegOpen = true;

    // SECURITY: ANTI-GHOST SESSION
    const s = localStorage.getItem('zmt_s');
    const k = localStorage.getItem('zmt_k');
    if(s === "MASTER_ADMIN" && k !== "zmtxxx") { localStorage.clear(); location.reload(); }
    if(s) start(s);

    // ONLINE COUNTER
    const oRef = ref(db, 'online/'+Math.floor(Math.random()*1e6));
    onDisconnect(oRef).remove(); set(oRef, true);
    onValue(ref(db, 'online'), (s) => document.getElementById('onlineVal').innerText = s.exists() ? Object.keys(s.val()).length : 1);

    window.login = async (role) => {
        if(role === 'admin') {
            const key = document.getElementById('aKey').value;
            if(key === "zmtxxx") { localStorage.setItem('zmt_k', "zmtxxx"); start("MASTER_ADMIN"); }
            else Swal.fire("INVALID KEY");
        } else {
            const u = document.getElementById('uIn').value.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
            const p = document.getElementById('pIn').value;
            if(u.length < 3) return Swal.fire("MIN 3 CHAR");
            const snap = await get(ref(db, `auth/${u}`));
            if(snap.exists() && snap.val().pw !== p) return Swal.fire("WRONG PW");
            await set(ref(db, `auth/${u}`), {pw:p}); start(u);
        }
    };

    function start(u) {
        myID = u; localStorage.setItem('zmt_s', u);
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        if(u === "MASTER_ADMIN") { document.getElementById('uiAdmin').style.display='block'; runAdmin(); }
        else { document.getElementById('uiUser').style.display='block'; runUser(); }
    }

    function runAdmin() {
        onValue(ref(db, 'q'), (s) => {
            items = []; const list = document.getElementById('queueList'); list.innerHTML = "";
            s.forEach(c => {
                items.push({u:c.val().u, k:c.key});
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
                    <span>@${c.val().u}</span><button class="z-btn-danger" onclick="kick('${c.key}')">KICK</button>
                </div>`;
            });
            document.getElementById('qCount').innerText = items.length;
            draw('wheel');
        });
    }

    function runUser() {
        onValue(ref(db, 'q'), (s) => {
            items = []; let joined = false;
            s.forEach(c => { items.push({u:c.val().u}); if(c.val().u === myID) joined = true; });
            document.getElementById('joinBtn').innerText = joined ? "JOINED ✅" : "JOIN SPIN";
            document.getElementById('joinBtn').disabled = joined;
            draw('wheelUser');
        });
        onValue(ref(db, 'wins'), (s) => {
            let win = false; s.forEach(c => { if(c.val().u === myID) win = true; });
            if(win) document.getElementById('winArea').style.display='block';
        });
    }

    // SYNC GLOBAL
    onValue(ref(db, 'config/marquee'), s => document.getElementById('mqText').innerText = s.val() || "ZMT EVENT ACTIVE");
    onValue(ref(db, 'config/reg'), s => isRegOpen = s.val() !== false);

    window.draw = (id) => {
        const c = document.getElementById(id); if(!c) return;
        const ctx = c.getContext('2d'); const n = items.length || 1; const arc = (2*Math.PI)/n;
        ctx.clearRect(0,0,500,500);
        items.forEach((it, i) => {
            ctx.beginPath(); ctx.fillStyle = i % 2 === 0 ? "#111" : varColor(i);
            ctx.moveTo(250,250); ctx.arc(250,250,245,i*arc,(i+1)*arc); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc+arc/2);
            ctx.fillStyle = "#fff"; ctx.font = "900 20px Inter"; ctx.fillText(it.u.substring(0,7).toUpperCase(), 120, 10); ctx.restore();
        });
    };

    function varColor(i) { return `hsl(${i * (360/items.length)}, 70%, 50%)`; }

    window.spinNow = () => {
        if(items.length < 2) return Swal.fire("MIN 2 USERS");
        const winIdx = Math.floor(Math.random() * items.length);
        const win = items[winIdx];
        const arc = 360 / items.length;
        const stop = (360 - (winIdx * arc)) - (arc/2);
        rot += 3600 + (stop - (rot % 360));
        document.getElementById('wheel').style.transform = `rotate(${rot}deg)`;
        setTimeout(async () => {
            confetti({particleCount: 200, spread: 80});
            await push(ref(db, 'wins'), {u: win.u});
            await remove(ref(db, `q/${win.k}`));
            Swal.fire("WINNER: @"+win.u);
        }, 6000);
    };

    window.kick = (k) => remove(ref(db, `q/${k}`));
    window.clearRoda = () => { if(confirm("Hapus semua antrian?")) remove(ref(db, 'q')); };
    window.setMarquee = (t) => set(ref(db, 'config/marquee'), t);
    window.setReg = (v) => set(ref(db, 'config/reg'), v);
    window.join = () => { if(!isRegOpen) return Swal.fire("CLOSED"); push(ref(db, 'q'), {u: myID}); };
    window.logout = () => { localStorage.clear(); location.reload(); };
    window.toggleGate = () => { 
        const u = document.getElementById('loginBox'); const a = document.getElementById('adminLoginBox');
        u.style.display = u.style.display === 'none' ? 'block' : 'none';
        a.style.display = a.style.display === 'none' ? 'block' : 'none';
    };
</script>
</body>
</html>
