<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT HUB V0.0.2</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --g: #f59e0b; --d: #060b18; --glass: rgba(255,255,255,0.05); --err: #ef4444; }
        * { -webkit-tap-highlight-color: transparent; outline: none !important; user-select: none; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--d); color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        .card { background: var(--glass); backdrop-filter: blur(20px); padding: 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        input { width: 100%; padding: 15px 20px; margin: 8px 0; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: inherit; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; font-family: inherit; display: flex; align-items: center; justify-content: center; }
        .btn-p { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 20px; margin-top: 10px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--p); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
        .w-wrap { position: relative; width: 260px; height: 260px; margin: 20px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid rgba(255,255,255,0.2); transition: 5s cubic-bezier(0.1,0,0.1,1); }
        .needle { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: var(--err); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 5; }
        .pill { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 50px; font-size: 13px; }
        .win-pill { background: linear-gradient(90deg, #f59e0b, #fbbf24); color: #000; font-weight: 800; }
        #gate { position: fixed; inset: 0; background: var(--d); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

<div id="gate">
    <div class="card" style="width: 100%; max-width: 350px; text-align: center;">
        <h2 style="color: var(--p); margin: 0;">ZMT HUB</h2>
        <p style="font-size: 10px; opacity: 0.4; margin-bottom: 30px;">V0.0.2 (STABLE)</p>
        <div id="uZone">
            <input type="text" id="lU" placeholder="Username">
            <input type="password" id="lP" placeholder="Password">
            <button class="btn btn-p" onclick="doLog()">MASUK / DAFTAR</button>
            <p onclick="toA(1)" style="margin-top:25px; font-size:10px; opacity:0.3; cursor:pointer;">ADMIN ACCESS</p>
        </div>
        <div id="aZone" style="display:none;">
            <input type="password" id="aK" placeholder="Admin Key">
            <button class="btn btn-p" style="background:var(--g); color:black;" onclick="doLogA()">VERIFY MASTER</button>
            <p onclick="toA(0)" style="margin-top:25px; font-size:10px; opacity:0.3; cursor:pointer;">KEMBALI</p>
        </div>
    </div>
</div>

<div id="app" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <b id="myTag" style="color:var(--p);"></b>
        <button onclick="off()" style="background:none; border:1px solid var(--err); color:var(--err); padding:6px 15px; border-radius:50px; font-size:10px; font-weight:800;">LOGOUT</button>
    </div>

    <div id="uiU" style="display:none;">
        <div class="card">
            <h3>Daftar Spin 🎡</h3>
            <button class="btn btn-p" onclick="gasQ()">GABUNG SEKARANG</button>
        </div>
        <div id="chatU" class="card" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size:14px; color:var(--g);">📩 PRIVATE CHAT</h3>
                <b onclick="document.getElementById('chatU').style.display='none'" style="color:var(--err); cursor:pointer;">CLOSE X</b>
            </div>
            <div id="boxU" class="chat-box"></div>
            <div style="display:flex; gap:8px; margin-top:12px;">
                <input type="text" id="mU" placeholder="Pesan..." style="margin:0;">
                <button class="btn btn-p" style="width:80px;" onclick="send('user')">KIRIM</button>
            </div>
        </div>
        <div class="card">
            <h4>🏆 Pemenang</h4>
            <div id="listWU"></div>
            <button id="btnReopenU" class="btn btn-p" style="display:none; margin-top:10px; background:var(--g); color:black; font-size:12px;" onclick="document.getElementById('chatU').style.display='block'">BUKA CHAT</button>
        </div>
    </div>

    <div id="uiA" style="display:none;">
        <div class="card" style="text-align:center;">
            <div class="w-wrap"><div class="needle"></div><canvas id="wheel" width="500" height="500"></canvas></div>
            <button class="btn btn-p" onclick="spin()">PUTAR SEKARANG</button>
            <div id="listQ" style="margin-top:20px;"></div>
        </div>
        <div class="card">
            <h3>📩 INBOX PEMENANG</h3>
            <div id="listWA"></div>
            <div id="chatActive" style="display:none; margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b id="chatName" style="color:var(--p);">Chat: -</b>
                    <b onclick="closeChatAdmin()" style="color:var(--err); cursor:pointer;">CLOSE X</b>
                </div>
                <div id="boxA" class="chat-box"></div>
                <div style="display:flex; gap:8px; margin-top:12px;">
                    <input type="text" id="mA" placeholder="Bales..." style="margin:0;">
                    <button class="btn btn-p" style="width:80px;" onclick="send('admin')">KIRIM</button>
                </div>
            </div>
        </div>
        <button class="btn" style="background:var(--err); color:white; margin-top:20px; font-size:11px;" onclick="wipe()">RESET TOTAL (HAPUS SEMUA)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set, get, off as offFirebase } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const USN_ADMIN = "MASTER_ADMIN";
    const KEY_ADMIN = "zmtxxx";

    const conf = {
        apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI",
        authDomain: "spinanberhadiahzmt.firebaseapp.com",
        databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "spinanberhadiahzmt",
        appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c"
    };

    const app = initializeApp(conf);
    const db = getDatabase(app);
    let myU = ""; let sData = []; let rot = 0; let activeChat = ""; let chatUnsub = null;

    window.toA = (s) => { document.getElementById('uZone').style.display = s ? 'none' : 'block'; document.getElementById('aZone').style.display = s ? 'block' : 'none'; };

    window.doLog = async () => {
        const u = document.getElementById('lU').value.trim().toLowerCase();
        const p = document.getElementById('lP').value.trim();
        if(!u || !p) return Swal.fire("Isi semua field!");
        
        const snap = await get(ref(db, `auth/${u}`));
        if(snap.exists()) {
            if(snap.val().pw === p) enter(u);
            else Swal.fire("Username sudah ada / Password salah!");
        } else {
            await set(ref(db, `auth/${u}`), {pw: p});
            enter(u);
        }
    };

    window.doLogA = () => { if(document.getElementById('aK').value === KEY_ADMIN) enter(USN_ADMIN); else Swal.fire("KEY SALAH!"); };
    
    function enter(u) { 
        localStorage.setItem('z_u', u); 
        location.reload(); 
    }
    
    window.off = () => { 
        localStorage.removeItem('z_u'); 
        location.reload(); 
    };

    const sess = localStorage.getItem('z_u');
    if(sess) {
        myU = sess;
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('myTag').innerText = (myU === USN_ADMIN) ? "👑 MASTER ADMIN" : "@" + myU;
        if(myU === USN_ADMIN) { document.getElementById('uiA').style.display='block'; runA(); }
        else { document.getElementById('uiU').style.display='block'; runU(); }
    }

    function runU() {
        onValue(ref(db, 'wipe'), (s) => { if(s.val()) off(); });
        onValue(ref(db, 'wins'), (s) => {
            const l = document.getElementById('listWU'); l.innerHTML = "";
            let imWin = false;
            if(s.exists()) {
                s.forEach(c => {
                    if(c.val().u === myU) imWin = true;
                    l.innerHTML += `<div class="pill win-pill"><span>${c.val().u}</span> 🏆</div>`;
                });
            }
            if(imWin) {
                document.getElementById('chatU').style.display = 'block';
                document.getElementById('btnReopenU').style.display = 'block';
                loadChat(myU, 'boxU');
            } else {
                document.getElementById('chatU').style.display = 'none';
                document.getElementById('btnReopenU').style.display = 'none';
            }
        });
    }

    window.gasQ = async () => {
        const snap = await get(ref(db, 'q'));
        let exist = false;
        if(snap.exists()) snap.forEach(c => { if(c.val().u === myU) exist = true; });
        if(exist) return Swal.fire("Sudah terdaftar!");
        push(ref(db, 'q'), {u: myU});
        Swal.fire({ icon: 'success', title: 'Berhasil!', timer: 1000, showConfirmButton: false });
    };

    function runA() {
        onValue(ref(db, 'q'), (s) => {
            const l = document.getElementById('listQ'); l.innerHTML = "";
            if(s.exists()) s.forEach(c => {
                l.innerHTML += `<div class="pill"><span>${c.val().u}</span><button onclick="addW('${c.val().u}')" style="background:var(--p); color:white; border:none; padding:6px 15px; border-radius:50px; font-weight:800; cursor:pointer;">ADD</button></div>`;
            });
        });
        onValue(ref(db, 'wins'), (s) => {
            const l = document.getElementById('listWA'); l.innerHTML = "";
            if(s.exists()) s.forEach(c => {
                l.innerHTML += `<div class="pill win-pill"><span>${c.val().u}</span><button onclick="startAdminChat('${c.val().u}')" style="background:#000; color:#fff; border:none; padding:6px 15px; border-radius:50px; font-weight:800; cursor:pointer;">CHAT</button></div>`;
            });
        });
    }

    window.startAdminChat = (user) => {
        if(chatUnsub) offFirebase(ref(db, `chats/${activeChat}`));
        document.getElementById('boxA').innerHTML = "";
        activeChat = user;
        document.getElementById('chatActive').style.display = 'block';
        document.getElementById('chatName').innerText = "Chat with: " + user;
        loadChat(user, 'boxA');
    };

    window.closeChatAdmin = () => {
        if(chatUnsub) offFirebase(ref(db, `chats/${activeChat}`));
        document.getElementById('chatActive').style.display = 'none';
        activeChat = "";
    };

    function loadChat(u, boxId) {
        const chatRef = ref(db, `chats/${u}`);
        chatUnsub = onValue(chatRef, (s) => {
            const box = document.getElementById(boxId);
            box.innerHTML = "";
            if(s.exists()) s.forEach(c => {
                const d = c.val();
                const cls = (d.sender === myU) ? 'me' : 'other';
                box.innerHTML += `<div class="msg ${cls}">${d.txt}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.send = (role) => {
        const inp = document.getElementById(role === 'admin' ? 'mA' : 'mU');
        const txt = inp.value.trim(); if(!txt) return;
        const target = (role === 'admin') ? activeChat : myU;
        if(target) { push(ref(db, `chats/${target}`), { sender: myU, txt: txt }); inp.value = ""; }
    };

    window.addW = (u) => { 
        let ex = false; sData.forEach(x => { if(x.u === u) ex = true; });
        if(!ex) { sData.push({u:u}); draw(); }
    };

    function draw() {
        const c = document.getElementById('wheel'); const ctx = c.getContext('2d');
        const n = sData.length || 1; const arc = (2 * Math.PI) / n;
        ctx.clearRect(0,0,500,500);
        for(let i=0; i<n; i++) {
            ctx.beginPath(); ctx.fillStyle = `hsl(${i * (360/n)}, 70%, 50%)`;
            ctx.moveTo(250, 250); ctx.arc(250, 250, 240, i * arc, (i+1) * arc); ctx.fill();
            ctx.save(); ctx.translate(250, 250); ctx.rotate(i * arc + arc/2);
            ctx.fillStyle = "#fff"; ctx.font = "bold 22px sans-serif"; ctx.fillText(sData[i]?.u || "ZMT", 110, 10); ctx.restore();
        }
    }

    window.spin = () => {
        if(sData.length < 2) return;
        rot += Math.floor(Math.random() * 360) + 3600;
        document.getElementById('wheel').style.transform = `rotate(${rot}deg)`;
        setTimeout(() => {
            const idx = Math.floor((360 - (rot % 360) + 270) % 360 / (360 / sData.length));
            const w = sData[idx];
            push(ref(db, 'wins'), w);
            sData.splice(idx, 1); draw();
        }, 5000);
    };

    window.wipe = async () => {
        if(confirm("HAPUS SEMUA DATA & AKUN?")) {
            await set(ref(db, 'wipe'), true);
            await remove(ref(db, 'q')); 
            await remove(ref(db, 'wins')); 
            await remove(ref(db, 'chats')); 
            await remove(ref(db, 'auth')); 
            setTimeout(() => { set(ref(db, 'wipe'), false); off(); }, 1000);
        }
    };
    draw();
</script>
</body>
</html>
