<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        (function() {
            const msg = sessionStorage.getItem('ZMT_MSG');
            if (msg) {
                window.addEventListener('load', () => {
                    setTimeout(() => {
                        if (window.Swal) {
                            Swal.fire({ 
                                title: 'ZMT SYSTEM', 
                                text: msg, 
                                icon: 'error', 
                                background: '#0a0a12', 
                                color: '#00f2fe',
                                confirmButtonColor: '#ff0844'
                            });
                            sessionStorage.removeItem('ZMT_MSG');
                        }
                    }, 600);
                });
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT LOGIN - v0.2.9</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --neon: #00f2fe; --win: #71ff00; --danger: #ff0844; --bg: #050508; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050508 100%); z-index: -2; }
        body::after { content: ""; position: fixed; inset: 0; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.3; z-index: -1; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        .btn { cursor: pointer; border: none; font-weight: 900; border-radius: 12px; transition: 0.2s; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); }
        
        .header { background: rgba(0,0,0,0.85); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 450px; margin: 10px auto; padding: 0 15px; }
        .card { background: rgba(255, 255, 255, 0.04); border-radius: 20px; border: 1px solid rgba(0, 242, 254, 0.15); padding: 15px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        
        /* Modern User Card (No Table) */
        .user-card { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .user-card b { color: var(--neon); font-size: 13px; display: block; }
        .user-card span { font-size: 9px; color: #888; }

        .chat-box { height: 180px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 12px; border-left: 3px solid var(--neon); }
        .msg-me { background: rgba(0, 242, 254, 0.1); align-self: flex-end; border-left: 0; border-right: 3px solid var(--neon); }
        .msg-bot { background: linear-gradient(90deg, var(--win), var(--neon)); color: #000; width: 100%; text-align: center; font-weight: 900; }

        .wheel-wrap { position: relative; width: 240px; height: 240px; margin: 15px auto; }
        canvas { width: 100% !important; height: 100% !important; border-radius: 50%; border: 4px solid var(--neon); box-shadow: 0 0 20px rgba(0,242,254,0.3); transition: 7s cubic-bezier(0.1, 0, 0, 1); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 20px; height: 30px; background: var(--win); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        input { width: 100%; padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.6); border: 1px solid var(--neon); color: var(--win); margin-top: 8px; }
        
        #pg-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 320px; padding: 40px 30px; border: 1px solid var(--neon); border-radius: 30px; background: rgba(10,10,20,0.95); text-align: center; box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); }
    </style>
</head>
<body>

<div id="pg-login">
    <div class="login-card">
        <h1 style="color:var(--neon); margin:0;">ZMT LOGIN</h1>
        <p style="color:#444; font-size:10px; margin-bottom:30px;">v0.2.9 (BETA - FINAL NEBULA)</p>
        <div id="u-form">
            <input type="text" id="log-u" placeholder="USERNAME">
            <input type="password" id="log-p" placeholder="PASSWORD">
            <button class="btn" style="background:var(--neon); width:100%; padding:15px; margin-top:20px; color:#000;" onclick="handleAuth('user')">MASUK / DAFTAR</button>
            <p onclick="setAdminMode(true)" style="color:transparent; font-size:10px; margin-top:20px;">CORE</p>
        </div>
        <div id="a-form" style="display:none;">
            <input type="password" id="a-key" placeholder="ADMIN KEY">
            <button class="btn" style="background:var(--danger); color:#fff; width:100%; padding:15px; margin-top:20px;" onclick="handleAuth('admin')">BYPASS ADMIN</button>
            <p onclick="setAdminMode(false)" style="color:#333; font-size:10px; margin-top:20px;">BACK</p>
        </div>
    </div>
</div>

<div id="pg-app" style="display:none;">
    <div class="header">
        <span style="font-weight:900; color:var(--neon);">ZMT.SYSTEM</span>
        <button class="btn" onclick="location.reload()" style="background:var(--danger); padding:6px 15px; color:#fff; font-size:10px;">LOGOUT</button>
    </div>

    <div class="container">
        <div id="ui-admin" style="display:none;">
            <div class="card">
                <p style="font-size:10px; color:var(--neon); margin-bottom:10px;">CONTROL PANEL</p>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button id="reg-toggle-btn" class="btn" style="flex:1; padding:12px; font-size:10px;" onclick="toggleRegStatus()">REG: ...</button>
                    <button class="btn" style="flex:1; background:var(--danger); color:#fff; padding:12px; font-size:10px;" onclick="wipeData()">RESET ALL</button>
                </div>
                <div id="admin-user-list" style="max-height:160px; overflow-y:auto;"></div>
            </div>
            <div class="card">
                <div class="chat-box" id="chat-a-g"></div>
                <input type="text" id="msg-a-g" placeholder="Chat atau /ban @user...">
                <button class="btn" style="background:var(--neon); width:100%; padding:10px; margin-top:10px; color:#000;" onclick="sendChat('a-g')">EXECUTE</button>
            </div>
            <div class="card">
                <div class="wheel-wrap"><div class="pointer"></div><canvas id="cv-a" width="500" height="500"></canvas></div>
                <button class="btn" style="background:var(--win); width:100%; padding:15px; color:#000;" onclick="startSpin()">PUTAR SEKARANG</button>
            </div>
            <div class="card">
                <div id="plist" style="display:flex; gap:8px; margin-bottom:10px; overflow-x:auto;"></div>
                <div class="chat-box" id="chat-a-p"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <label style="background:var(--neon); padding:10px; border-radius:50%; cursor:pointer;">📷<input type="file" hidden accept="image/*" onchange="upImg(this, 'a-p')"></label>
                    <input type="text" id="msg-a-p" placeholder="Private chat..." style="margin:0;">
                    <button class="btn" onclick="sendChat('a-p')" style="background:var(--neon); padding:0 20px; color:#000;">SEND</button>
                </div>
            </div>
        </div>

        <div id="ui-user" style="display:none;">
            <div class="card">
                <button id="btn-join-queue" class="btn" style="background:var(--neon); width:100%; padding:18px; color:#000; font-size:14px; box-shadow: 0 0 15px var(--neon);" onclick="joinSpin()">DAFTAR ANTREAN SPIN</button>
            </div>
            <div class="card"><div class="wheel-wrap"><div class="pointer"></div><canvas id="cv-u" width="500" height="500"></canvas></div></div>
            <div class="card">
                <p style="font-size:11px; color:var(--neon); font-weight:bold;">CHATS</p>
                <div class="chat-box" id="chat-u-g"></div>
                <input type="text" id="msg-u-g" placeholder="Ketik pesan...">
                <button class="btn" style="background:var(--neon); width:100%; padding:12px; margin-top:10px; color:#000;" onclick="sendChat('u-g')">KIRIM</button>
            </div>
            <div id="box-win" class="card" style="display:none; border: 2px solid var(--win);">
                <p style="color:var(--win); font-weight:bold; font-size:12px;">🎁 KLAIM ROOM</p>
                <div class="chat-box" id="chat-u-p" style="height:140px;"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <label style="background:var(--win); padding:10px; border-radius:50%; cursor:pointer;">📷<input type="file" hidden accept="image/*" onchange="upImg(this, 'u-p')"></label>
                    <input type="text" id="msg-u-p" placeholder="Kirim bukti..." style="margin:0;">
                    <button class="btn" onclick="sendChat('u-p')" style="background:var(--win); padding:0 20px; color:#000;">SEND</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const cfg = { apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI", authDomain: "spinanberhadiahzmt.firebaseapp.com", databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "spinanberhadiahzmt", appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c" };
    const app = initializeApp(cfg); const db = getDatabase(app);
    let myU = "", myR = "", myIP = "", curT = "", regOpen = true;

    // --- GET IP FIX ---
    async function getIP() {
        try {
            const res = await fetch('https://api64.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch (e) { return "127.0.0.1"; }
    }

    // --- AUTH ---
    window.handleAuth = async (role) => {
        myIP = await getIP();
        const cleanIP = myIP.replace(/\./g, '_');

        if(role === 'admin') {
            if(document.getElementById('a-key').value === "zmtxxx") { myU="ADMIN"; myR="admin"; startApp(); }
            return;
        }

        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value;
        if(!u || !p) return;

        const regSnap = await get(ref(db, 'config/regOpen'));
        regOpen = regSnap.exists() ? regSnap.val() : true;

        const uRef = ref(db, `auth/users/${u}`);
        const snap = await get(uRef);

        if(snap.exists()) {
            const d = snap.val();
            if(d.bl) { Swal.fire('BLOCKED','Anda di-ban permanen!','error'); return; }
            if(d.pw === p) { myU=u; myR="user"; startApp(); } else { Swal.fire('GAGAL','Password salah!','error'); }
        } else {
            if(!regOpen) { Swal.fire('CLOSED','Pendaftaran ditutup Admin!','warning'); return; }
            const ipSnap = await get(ref(db, `auth/ips/${cleanIP}`));
            if(ipSnap.exists()) { Swal.fire('LIMIT','IP ini sudah punya akun!','warning'); return; }
            
            await set(uRef, {pw:p, ip:myIP, bl:false, crash:false});
            await set(ref(db, `auth/ips/${cleanIP}`), u);
            myU=u; myR="user"; startApp();
        }
    };

    function startApp() {
        document.getElementById('pg-login').style.display='none';
        document.getElementById('pg-app').style.display='block';
        if(myR==='admin') { document.getElementById('ui-admin').style.display='block'; initAdmin(); }
        else { document.getElementById('ui-user').style.display='block'; initUser(); }
    }

    // --- ADMIN PANEL ---
    window.toggleRegStatus = () => {
        set(ref(db, 'config/regOpen'), !regOpen);
    };

    window.wipeData = () => {
        Swal.fire({ title: 'HAPUS SEMUA?', text: "Data user, IP, & chat akan hilang!", icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) { remove(ref(db, 'auth')); remove(ref(db, 'queue')); remove(ref(db, 'chats')); remove(ref(db, 'wins')); location.reload(); }
        });
    };

    function initAdmin() {
        onValue(ref(db, 'config/regOpen'), s => {
            regOpen = s.val() !== false;
            const btn = document.getElementById('reg-toggle-btn');
            btn.innerText = regOpen ? "REG: OPEN" : "REG: CLOSED";
            btn.style.background = regOpen ? "#71ff00" : "#ff0844";
            btn.style.color = "#000";
        });
        onValue(ref(db, 'auth/users'), s => {
            const list = document.getElementById('admin-user-list'); list.innerHTML = "";
            s.forEach(c => {
                const d = c.val();
                list.innerHTML += `<div class="user-card">
                    <div><b>@${c.key}</b><span>PW: ${d.pw} | IP: ${d.ip}</span></div>
                    <button class="btn" style="background:var(--danger); color:#fff; font-size:9px; padding:5px 10px;" onclick="execCmd('/ban @${c.key}')">BAN</button>
                </div>`;
            });
        });
        onValue(ref(db, 'queue'), s => { let q=[]; s.forEach(c => q.push({u:c.val().u, k:c.key})); drawWheel('cv-a', q); });
        onValue(ref(db, 'wins'), s => {
            const l = document.getElementById('plist'); l.innerHTML = "";
            s.forEach(c => { l.innerHTML += `<button class="btn" style="background:var(--win); color:#000; padding:5px 10px; font-size:10px;" onclick="setTarget('${c.key}')">@${c.key}</button>`; });
        });
        listenChat('chats/global', 'chat-a-g');
    }

    // --- USER PANEL ---
    window.joinSpin = () => {
        set(ref(db, `queue/${myU}`), {u:myU}).then(() => Swal.fire('SUKSES','Masuk Antrean!','success'));
    };

    function initUser() {
        onValue(ref(db, `auth/users/${myU}`), s => {
            if(!s.exists()) { sessionStorage.setItem('ZMT_MSG', '🚫 AKUN ANDA TELAH DIBAN!'); location.reload(); return; }
            const d = s.val();
            if(d.k) { sessionStorage.setItem('ZMT_MSG', d.k); location.reload(); return; }
            if(d.crash) setInterval(()=>location.reload(), 100);
        });
        onValue(ref(db, 'queue'), s => { let q=[]; s.forEach(c => q.push({u:c.val().u})); drawWheel('cv-u', q); });
        onValue(ref(db, 'config/sync'), s => {
            const d = s.val(); if(!d) return;
            document.getElementById('cv-u').style.transform = `rotate(${d.r}deg)`;
            if(d.d && d.w === myU) { confetti(); Swal.fire('MENANG!','Klaim hadiah sekarang!','success'); }
        });
        onValue(ref(db, `chats/private/${myU}`), s => {
            if(s.exists()) { document.getElementById('box-win').style.display='block'; listenChat(`chats/private/${myU}`, 'chat-u-p'); }
        });
        listenChat('chats/global', 'chat-u-g');
    }

    // --- CORE ---
    window.execCmd = async (str) => {
        const p = str.split(' '); const act = p[0].toLowerCase(); const target = p[1]?.replace('@','');
        if(!target) return;
        const tRef = ref(db, `auth/users/${target}`);
        const snap = await get(tRef); if(!snap.exists()) return;
        const tip = snap.val().ip.replace(/\./g, '_');
        if(act==='/ban') { 
            await update(tRef, {k: '🚫 TERMINATED: BANNED BY ADMIN'});
            setTimeout(() => { remove(tRef); remove(ref(db, `auth/ips/${tip}`)); }, 800);
        }
    };

    function listenChat(path, id) {
        onValue(ref(db, path), s => {
            const b = document.getElementById(id); b.innerHTML = "";
            s.forEach(c => {
                const d = c.val(); const cls = d.bot?'msg-bot':(d.s===myU?'msg-me':'msg-ot');
                const content = d.img ? `<img src="${d.img}" style="width:100%; border-radius:10px; margin-top:5px;" onclick="window.open('${d.img}')">` : d.m;
                b.innerHTML += `<div class="msg ${cls}">${d.bot?'':`<b>${d.s}:</b><br>`}${content}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    window.sendChat = (type) => {
        const inp = document.getElementById(`msg-${type.replace('-','-')}`);
        if(!inp.value) return;
        if(type==='a-g' && inp.value.startsWith('/')) { execCmd(inp.value); inp.value=""; return; }
        const path = type.includes('g') ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
        push(ref(db, path), {s:myU, m:inp.value}); inp.value = "";
    };

    window.upImg = (input, type) => {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const path = type.includes('g') ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
            push(ref(db, path), {s:myU, img: e.target.result});
        };
        reader.readAsDataURL(file);
    };

    window.setTarget = (u) => { curT = u; listenChat(`chats/private/${u}`, 'chat-a-p'); };

    window.startSpin = async () => {
        const snap = await get(ref(db, 'queue')); const q = [];
        snap.forEach(c => q.push({u:c.val().u, k:c.key}));
        if(q.length < 2) return;
        const i = Math.floor(Math.random() * q.length);
        const rot = (360 * 10) + (360 - (i * (360/q.length))) - ((360/q.length)/2);
        await set(ref(db, 'config/sync'), { r: rot, w: q[i].u, d: false });
        setTimeout(async () => {
            await update(ref(db, 'config/sync'), { d: true });
            push(ref(db, 'chats/global'), {bot:true, m:`🔥 PEMENANG: @${q[i].u}!`});
            set(ref(db, `wins/${q[i].u}`), true);
            set(ref(db, `chats/private/${q[i].u}/init`), {s:"BOT", m:"Selamat! Kirim bukti klaim di sini."});
            remove(ref(db, `queue/${q[i].u}`));
        }, 7100);
    };

    function drawWheel(id, l) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        const n = l.length || 1; const a = (2*Math.PI)/n; ctx.clearRect(0,0,500,500);
        l.forEach((p, i) => {
            ctx.beginPath(); ctx.fillStyle = i%2===0 ? '#0d1117' : '#161b22'; ctx.moveTo(250,250); ctx.arc(250,250,240,i*a,(i+1)*a); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*a + a/2); ctx.fillStyle = "#00f2fe"; ctx.font = "bold 20px Arial"; ctx.textAlign="right"; ctx.fillText(p.u.substring(0,10), 230, 8); ctx.restore();
        });
    }

    window.setAdminMode = (v) => { document.getElementById('u-form').style.display=v?'none':'block'; document.getElementById('a-form').style.display=v?'block':'none'; };
</script>
</body>
</html>
