<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT EVENT V0.0.3 ULTIMATE</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --g: #f59e0b; --d: #060b18; --glass: rgba(255,255,255,0.1); --err: #ef4444; --succ: #10b981; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; min-height: 100vh; color: white; background: #060b18; user-select: none; overflow-x: hidden; }
        
        #gate { position: fixed; inset: 0; background: rgba(6,11,24,0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(15px); }
        #app { display: none; }

        .card { background: var(--glass); backdrop-filter: blur(20px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        
        .marquee-box { width: 100%; overflow: hidden; background: rgba(99, 102, 241, 0.2); border-radius: 10px; margin-bottom: 15px; padding: 12px 0; }
        .marquee-content { display: inline-block; white-space: nowrap; animation: jalan-kiri 15s linear infinite; color: var(--g); font-weight: 800; }
        @keyframes jalan-kiri { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; font-family: inherit; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-family: inherit; }
        .btn-p { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-err { background: var(--err); color: white; }

        .db-table { width: 100%; border-collapse: collapse; font-size: 12px; user-select: text !important; }
        .db-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-area { height: 220px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px; user-select: text !important; }
        .msg { max-width: 85%; padding: 10px; border-radius: 15px; font-size: 13px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--p); border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }

        .w-wrap { position: relative; width: 270px; height: 270px; margin: 20px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: 5s cubic-bezier(0.1, 0, 0.1, 1); border: 4px solid rgba(255,255,255,0.2); }
        .needle { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 30px; height: 45px; background: var(--err); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; border: 2px solid white; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .on { background: var(--succ); } .off { background: var(--err); }
    </style>
</head>
<body>

<audio id="sTick" src="https://www.soundjay.com/buttons/sounds/button-20.mp3"></audio>
<audio id="sWin" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<div id="gate">
    <div class="card" style="width: 100%; max-width: 350px; text-align: center;">
        <h2 style="color: var(--p); margin: 0; letter-spacing: 2px;">ZMT EVENT</h2>
        <p style="font-size: 10px; opacity: 0.5; margin-bottom: 25px;">V0.0.3 (REALTIME FIX)</p>
        <div id="loginUserBox">
            <input type="text" id="userInput" placeholder="Username">
            <input type="password" id="passInput" placeholder="Password">
            <button class="btn btn-p" id="btnLoginMain" onclick="authNow('user')">MASUK / DAFTAR</button>
            <p onclick="switchGate('admin')" style="margin-top:20px; font-size:10px; opacity:0.4; cursor:pointer;">ADMIN PANEL</p>
        </div>
        <div id="loginAdminBox" style="display:none;">
            <input type="password" id="adminKeyInput" placeholder="Secret Key">
            <button class="btn btn-p" style="background:var(--g); color:black;" onclick="authNow('admin')">VERIFY ADMIN</button>
            <p onclick="switchGate('user')" style="margin-top:20px; font-size:10px; opacity:0.4; cursor:pointer;">KEMBALI</p>
        </div>
    </div>
</div>

<div id="app">
    <div class="marquee-box"><div class="marquee-content" id="infoText">ZMT EVENT READY...</div></div>
    
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <div><b id="displayUser" style="color:var(--p); font-size:18px;"></b><div style="font-size:10px;"><span id="statusDot" class="status-dot"></span> Reg: <span id="statusText">...</span></div></div>
        <button onclick="handleLogout()" style="background:none; border:1px solid var(--err); color:var(--err); padding:6px 15px; border-radius:50px; font-size:10px; font-weight:800;">LOGOUT</button>
    </div>

    <div id="uiAdmin" style="display:none;">
        <div class="card" style="display:flex; gap:10px;">
            <button class="btn" style="background:var(--succ); color:white; flex:1;" onclick="setReg(true)">BUKA</button>
            <button class="btn" style="background:var(--err); color:white; flex:1;" onclick="setReg(false)">TUTUP</button>
        </div>
        <div class="card">
            <h4 style="margin:0 0 10px 0; color:var(--g);">📂 DATA AKUN (TERDAFTAR)</h4>
            <div style="max-height: 150px; overflow-y: auto;">
                <table class="db-table"><tbody id="userTableBody"></tbody></table>
            </div>
        </div>
        <div class="card" style="text-align:center;">
            <div class="w-wrap"><div class="needle"></div><canvas id="wheel" width="500" height="500"></canvas></div>
            <button class="btn btn-p" onclick="doSpin()">PUTAR RODA</button>
        </div>
        <div class="card">
            <h4>CHAT PEMENANG</h4>
            <div id="adminChatList"></div>
            <div id="activeChatAdmin" style="display:none; margin-top:15px; border-top:1px solid #444; padding-top:10px;">
                <b id="targetChatUser" style="color:var(--g)"></b>
                <div id="chatBoxAdmin" class="chat-area"></div>
                <div style="display:flex; gap:10px; margin-top:10px;"><input type="text" id="msgAdmin" placeholder="Balas..."><button class="btn btn-p" style="width:80px;" onclick="sendChat('admin')">KIRIM</button></div>
            </div>
        </div>
        <button class="btn" style="background:rgba(239, 68, 68, 0.1); color:var(--err); border:1px solid var(--err); margin-bottom: 20px;" onclick="resetDB()">⚠️ HARD RESET (HAPUS SEMUA AKUN)</button>
    </div>

    <div id="uiUser" style="display:none;">
        <div id="joinSection" class="card"><button class="btn btn-p" id="btnJoin" onclick="joinSpin()">IKUT SPIN SEKARANG</button></div>
        <div id="chatWinnerSection" class="card" style="display:none; border: 1px solid var(--g);">
            <h4 style="color:var(--g); margin:0 0 10px 0;">🏆 ANDA MENANG! CHAT ADMIN:</h4>
            <div id="chatBoxUser" class="chat-area"></div>
            <div style="display:flex; gap:10px; margin-top:10px;"><input type="text" id="msgUser" placeholder="Tulis pesan..."><button class="btn btn-p" style="width:80px;" onclick="sendChat('user')">KIRIM</button></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set, get } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const fbConfig = {
        apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI",
        authDomain: "spinanberhadiahzmt.firebaseapp.com",
        databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "spinanberhadiahzmt",
        appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c"
    };

    const appFB = initializeApp(fbConfig);
    const db = getDatabase(appFB);
    let myID = ""; let wheelItems = []; let rot = 0; let activeChat = ""; let regStatus = true;

    // LOGIN & KICK LISTENER
    onValue(ref(db, 'config/regStatus'), (s) => {
        regStatus = s.val();
        const bl = document.getElementById('btnLoginMain');
        if (!regStatus) {
            if(bl) { bl.innerText = "PENDAFTARAN DITUTUP"; bl.classList.add('btn-err'); }
            document.getElementById('statusText').innerText = "TUTUP"; document.getElementById('statusDot').className = "status-dot off";
            if (myID !== "" && myID !== "MASTER_ADMIN") handleLogout();
        } else {
            if(bl) { bl.innerText = "MASUK / DAFTAR"; bl.classList.remove('btn-err'); }
            document.getElementById('statusText').innerText = "BUKA"; document.getElementById('statusDot').className = "status-dot on";
        }
    });

    onValue(ref(db, 'config/wipeTrigger'), (s) => { if(s.val() && myID !== "MASTER_ADMIN") handleLogout(); });

    // --- REALTIME WHEEL SYNC ---
    onValue(ref(db, 'q'), (s) => { 
        wheelItems = []; 
        if(s.exists()) s.forEach(c => wheelItems.push({u: c.val().u, key: c.key})); 
        draw(); // REDRAW OTOMATIS SETIAP ADA PERUBAHAN
    });

    window.authNow = async (role) => {
        if (role === 'admin') {
            if (document.getElementById('adminKeyInput').value === "zmtxxx") startApp("MASTER_ADMIN");
            else Swal.fire("Key Salah!");
        } else {
            if (!regStatus) return Swal.fire("Pendaftaran Tutup!");
            const u = document.getElementById('userInput').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            const p = document.getElementById('passInput').value.trim();
            if (!u || !p) return Swal.fire("Isi data!");
            const snap = await get(ref(db, `auth/${u}`));
            if (snap.exists() && snap.val().pw !== p) return Swal.fire("Sandi Salah!");
            await set(ref(db, `auth/${u}`), { pw: p });
            startApp(u);
        }
    };

    function startApp(u) {
        myID = u; localStorage.setItem('zmt_sess', u);
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('displayUser').innerText = (u === "MASTER_ADMIN") ? "🛡️ ADMIN" : "@" + u;
        if (u === "MASTER_ADMIN") { document.getElementById('uiAdmin').style.display = 'block'; runAdmin(); }
        else { document.getElementById('uiUser').style.display = 'block'; runUser(); }
    }

    const saved = localStorage.getItem('zmt_sess');
    if (saved) startApp(saved);
    window.handleLogout = () => { localStorage.clear(); location.reload(); };

    window.doSpin = () => {
        if(wheelItems.length < 2) return Swal.fire("Minimal 2 orang!");
        const winIdx = Math.floor(Math.random() * wheelItems.length);
        const winner = wheelItems[winIdx];
        const arc = 360 / wheelItems.length;
        const stopAt = (360 - (winIdx * arc)) - (arc / 2);
        rot += 3600 + (stopAt - (rot % 360));
        document.getElementById('wheel').style.transform = `rotate(${rot}deg)`;
        let tick = setInterval(() => { document.getElementById('sTick').currentTime = 0; document.getElementById('sTick').play(); }, 150);
        setTimeout(async () => {
            clearInterval(tick); document.getElementById('sWin').play();
            await push(ref(db, 'wins'), { u: winner.u });
            await remove(ref(db, `q/${winner.key}`));
        }, 5000);
    };

    function runAdmin() {
        onValue(ref(db, 'auth'), (s) => {
            const tb = document.getElementById('userTableBody'); tb.innerHTML = "";
            s.forEach(c => { tb.innerHTML += `<tr><td>@${c.key}</td><td>${c.val().pw}</td></tr>`; });
        });
        onValue(ref(db, 'wins'), (s) => {
            const list = document.getElementById('adminChatList'); list.innerHTML = "";
            s.forEach(c => { list.innerHTML += `<button class="btn" style="margin-bottom:5px; font-size:10px;" onclick="openChat('${c.val().u}')">Chat @${c.val().u} 💬</button>`; });
        });
    }

    function draw() {
        const canvas = document.getElementById('wheel'); const ctx = canvas.getContext('2d');
        const n = wheelItems.length || 1; const arc = (2 * Math.PI) / n;
        ctx.clearRect(0,0,500,500);
        for(let i=0; i<n; i++) {
            ctx.beginPath(); ctx.fillStyle = `hsl(${i * (360/n)}, 70%, 50%)`;
            ctx.moveTo(250, 250); ctx.arc(250, 250, 245, i * arc, (i+1) * arc); ctx.fill();
            ctx.save(); ctx.translate(250, 250); ctx.rotate(i * arc + arc/2);
            ctx.fillStyle = "#fff"; ctx.font = "bold 20px sans-serif"; ctx.fillText(wheelItems[i]?.u || "ZMT", 110, 10); ctx.restore();
        }
    }

    function runUser() {
        onValue(ref(db, 'wins'), (s) => {
            let win = false; s.forEach(c => { if(c.val().u === myID) win = true; });
            if(win) { document.getElementById('chatWinnerSection').style.display='block'; listenChat(myID, 'chatBoxUser'); }
        });
        onValue(ref(db, 'q'), (s) => {
            let j = false; s.forEach(c => { if(c.val().u === myID) j = true; });
            document.getElementById('btnJoin').disabled = j;
            document.getElementById('btnJoin').innerText = j ? "DAFTAR BERHASIL ✅" : "IKUT SPIN SEKARANG";
        });
    }

    window.openChat = (u) => { activeChat = u; document.getElementById('activeChatAdmin').style.display = 'block'; document.getElementById('targetChatUser').innerText = "Chat @" + u; listenChat(u, 'chatBoxAdmin'); };
    window.sendChat = async (role) => {
        const t = role === 'admin' ? activeChat : myID;
        const inp = document.getElementById(role === 'admin' ? 'msgAdmin' : 'msgUser');
        if(!inp.value.trim()) return;
        await push(ref(db, `chats/${t}`), { sender: myID, text: inp.value });
        inp.value = "";
    };

    function listenChat(u, b) {
        onValue(ref(db, `chats/${u}`), (s) => {
            const box = document.getElementById(b); box.innerHTML = "";
            s.forEach(c => { box.innerHTML += `<div class="msg ${c.val().sender === myID ? 'me' : 'other'}">${c.val().text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.resetDB = async () => {
        if(confirm("HAPUS SEMUA DATA, SEMUA AKUN, & TENDANG SEMUA USER?")) {
            await set(ref(db, 'config/wipeTrigger'), true);
            await remove(ref(db, 'auth'));
            await remove(ref(db, 'q'));
            await remove(ref(db, 'wins'));
            await remove(ref(db, 'chats'));
            setTimeout(() => set(ref(db, 'config/wipeTrigger'), false), 1500);
            Swal.fire("Selesai!");
        }
    };

    window.joinSpin = async () => { await push(ref(db, 'q'), { u: myID }); Swal.fire("Berhasil!"); };
    window.setReg = (v) => set(ref(db, 'config/regStatus'), v);
    window.switchGate = (m) => { document.getElementById('loginUserBox').style.display = m==='user'?'block':'none'; document.getElementById('loginAdminBox').style.display = m==='admin'?'block':'none'; };
</script>
</body>
                                                                          </html>
