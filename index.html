<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT v1.3.0 GOD MODE</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --neon: #38bdf8; --win: #4ade80; --danger: #fb7185; --bg: #020617; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #f1f5f9;
            background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            background-attachment: fixed; overflow-x: hidden;
        }
        .container { max-width: 420px; margin: auto; padding: 15px; }
        .card { 
            background: rgba(255, 255, 255, 0.03); border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 15px; 
            margin-bottom: 15px; backdrop-filter: blur(20px);
        }
        .btn { 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); 
            font-weight: 700; border-radius: 50px; transition: 0.2s; 
            text-transform: uppercase; font-size: 10px; display: flex; align-items: center; justify-content: center;
        }
        .btn:active { transform: scale(0.95); opacity: 0.7; }
        .btn-glass { background: rgba(56, 189, 248, 0.1); color: var(--neon); }
        .btn-danger { background: rgba(251, 113, 133, 0.1); color: var(--danger); }
        .btn-win { background: rgba(74, 222, 128, 0.1); color: var(--win); }

        input { width: 100%; padding: 14px 20px; border-radius: 50px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 8px; }

        .chat-box { height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 5px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 18px; font-size: 13px; background: rgba(255,255,255,0.05); }
        .msg-me { align-self: flex-end; background: rgba(56, 189, 248, 0.15); border: 1px solid rgba(56,189,248,0.2); }
        .msg-bot { width: 100%; text-align: center; color: var(--win); border: 1px dashed var(--win); background: transparent; }

        .wheel-wrap { position: relative; width: 220px; height: 220px; margin: 15px auto; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 6px solid rgba(255,255,255,0.05); transition: 8s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 25px; height: 35px; background: var(--neon); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        #pg-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 11px; }
    </style>
</head>
<body>

<div id="pg-login">
    <div style="width: 310px; text-align: center;">
        <h2 style="letter-spacing: 5px; color: var(--neon); margin-bottom: 20px;">ZMT GOD MODE</h2>
        <div class="card">
            <div id="u-form">
                <input type="text" id="log-u" placeholder="Username">
                <input type="password" id="log-p" placeholder="Password">
                <button class="btn btn-glass" style="width:100%; padding:18px;" onclick="handleAuth('user')">MASUK / DAFTAR</button>
                <p onclick="setA(true)" style="font-size:9px; color:#334155; margin-top:20px; cursor:pointer;">ADMIN BYPASS</p>
            </div>
            <div id="a-form" style="display:none;">
                <input type="password" id="a-key" placeholder="Admin Key">
                <button class="btn btn-danger" style="width:100%; padding:18px;" onclick="handleAuth('admin')">FORCE ADMIN LOGIN</button>
                <p onclick="setA(false)" style="font-size:9px; color:#334155; margin-top:20px; cursor:pointer;">BACK</p>
            </div>
        </div>
    </div>
</div>

<div id="pg-app" style="display:none;">
    <div style="padding:15px 20px; display:flex; justify-content:space-between; align-items:center; background:rgba(2,6,23,0.9); backdrop-filter:blur(10px); position:sticky; top:0; z-index:100; border-bottom:1px solid rgba(255,255,255,0.05);">
        <span id="display-u" style="font-weight:800; color:var(--neon); font-size:12px;">@USER</span>
        <button class="btn btn-danger" onclick="location.reload()" style="padding:5px 12px; font-size:9px;">LOGOUT</button>
    </div>

    <div class="container">
        <div id="ui-admin" style="display:none;">
            <div class="card">
                <div style="display:flex; gap:10px; margin-bottom:12px;">
                    <button id="reg-btn" class="btn" style="flex:1; padding:12px;" onclick="togReg()">REGIS: ...</button>
                    <button class="btn btn-danger" style="flex:1;" onclick="wipeData()">RESET TOTAL (10/10)</button>
                </div>
                <div id="adm-users" style="max-height:220px; overflow-y:auto; background:rgba(0,0,0,0.2); border-radius:15px;"></div>
            </div>
            <div class="card">
                <div class="chat-box" id="chat-a-g"></div>
                <input type="text" id="msg-a-g" placeholder="/ban @user, /crash @user...">
                <button class="btn btn-glass" style="width:100%; padding:14px;" onclick="send('a-g')">KIRIM / EKSEKUSI</button>
            </div>
            <div class="card">
                <div class="wheel-wrap"><div class="pointer"></div><canvas id="cv-a" width="500" height="500"></canvas></div>
                <button class="btn btn-win" style="width:100%; padding:18px;" onclick="spin()">SPIN RODA</button>
            </div>
            <div class="card">
                <div id="plist" style="display:flex; gap:5px; margin-bottom:10px; overflow-x:auto;"></div>
                <div class="chat-box" id="chat-a-p"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <label class="btn btn-glass" style="width:45px; height:45px; border-radius:50%; padding:0;">📷<input type="file" hidden accept="image/*" onchange="upImg(this,'a-p')"></label>
                    <input type="text" id="msg-a-p" placeholder="Balas klaim..." style="margin:0;">
                    <button class="btn btn-glass" onclick="send('a-p')" style="padding:0 20px;">SEND</button>
                </div>
            </div>
        </div>

        <div id="ui-user" style="display:none;">
            <div class="card">
                <button id="btn-join" class="btn btn-glass" style="width:100%; padding:22px;" onclick="joinQ()">IKUT ANTREAN SPIN</button>
            </div>
            <div class="card"><div class="wheel-wrap"><div class="pointer"></div><canvas id="cv-u" width="500" height="500"></canvas></div></div>
            <div class="card">
                <div class="chat-box" id="chat-u-g"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="msg-u-g" placeholder="Chat di sini..." style="margin:0;">
                    <button class="btn btn-glass" onclick="send('u-g')" style="padding:0 20px;">SEND</button>
                </div>
            </div>
            <div id="win-box" class="card" style="display:none; border:1px solid var(--win);">
                <p style="color:var(--win); font-size:11px; font-weight:bold;">🎁 KLAIM HADIAH</p>
                <div class="chat-box" id="chat-u-p" style="height:150px;"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <label class="btn btn-win" style="width:45px; height:45px; border-radius:50%; padding:0;">📷<input type="file" hidden accept="image/*" onchange="upImg(this,'u-p')"></label>
                    <input type="text" id="msg-u-p" placeholder="Kirim bukti foto..." style="margin:0;">
                    <button class="btn btn-win" onclick="send('u-p')" style="padding:0 20px;">SEND</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const cfg = { apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI", authDomain: "spinanberhadiahzmt.firebaseapp.com", databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "spinanberhadiahzmt", appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c" };
    const app = initializeApp(cfg); const db = getDatabase(app);
    let myU="", myR="", regOpen=true, curT="", isLogged=false;

    window.setA = (v) => { document.getElementById('u-form').style.display=v?'none':'block'; document.getElementById('a-form').style.display=v?'block':'none'; };

    window.handleAuth = async (role) => {
        if(role==='admin'){
            if(document.getElementById('a-key').value === "zmtxxx") { 
                myU="ADMIN"; myR="admin"; isLogged=true; start(); 
            } else { Swal.fire('Error','Key Salah!','error'); }
            return;
        }

        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value;
        if(!u || !p) return;

        const uRef = ref(db, `auth/users/${u}`);
        const snap = await get(uRef);
        
        if(snap.exists()){
            const d = snap.val();
            if(d.bl) { Swal.fire('Banned','Akun ini telah di-ban!','error'); return; }
            if(d.pw === p) { myU=u; myR="user"; isLogged=true; start(); } 
            else { Swal.fire('Error','PW Salah!','error'); }
        } else {
            const configSnap = await get(ref(db, 'config/regOpen'));
            if(configSnap.exists() && configSnap.val() === false) { Swal.fire('Tutup','Pendaftaran ditutup!','warning'); return; }
            await set(uRef, {pw:p, bl:false, crash:false});
            myU=u; myR="user"; isLogged=true; start();
        }
    };

    function start() {
        document.getElementById('pg-login').style.display = 'none';
        document.getElementById('pg-app').style.display = 'block';
        document.getElementById('display-u').innerText = "@" + myU;
        if(myR==='admin') { document.getElementById('ui-admin').style.display='block'; initA(); }
        else { document.getElementById('ui-user').style.display='block'; initU(); }
    }

    // --- ADMIN ENGINE (10/10) ---
    window.togReg = () => set(ref(db, 'config/regOpen'), !regOpen);
    window.wipeData = () => {
        Swal.fire({ title: 'WIPE ALL 10/10?', text: 'Hapus SEMUA data tanpa sisa!', icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) {
                // Hapus Seluruh Node (10/10 Clear)
                remove(ref(db)).then(() => {
                    set(ref(db, 'config'), { regOpen: true, wipe: Date.now() });
                    Swal.fire('BERSIH!','Sistem di-reset total.','success').then(() => location.reload());
                });
            }
        });
    };

    function initA() {
        onValue(ref(db, 'config/regOpen'), s => {
            regOpen = s.val() !== false;
            const b = document.getElementById('reg-btn');
            b.innerText = regOpen ? "REGIS: OPEN" : "REGIS: CLOSED";
            b.className = regOpen ? "btn btn-win" : "btn btn-danger";
        });
        onValue(ref(db, 'auth/users'), s => {
            const list = document.getElementById('adm-users'); list.innerHTML = "";
            if(!s.exists()) return;
            s.forEach(c => {
                const d = c.val();
                list.innerHTML += `<div class="user-row">
                    <span><b>@${c.key}</b> | PW: <span style="color:var(--win)">${d.pw}</span></span>
                    <button class="btn btn-danger" style="padding:5px 10px;" onclick="execCmd('/ban @${c.key}')">BAN</button>
                </div>`;
            });
        });
        onValue(ref(db, 'queue'), s => { let q=[]; s.forEach(c => q.push({u:c.val().u})); draw('cv-a', q); });
        onValue(ref(db, 'wins'), s => {
            const l = document.getElementById('plist'); l.innerHTML = "";
            s.forEach(c => { l.innerHTML += `<button class="btn btn-win" style="padding:8px 12px; margin-right:5px;" onclick="setT('${c.key}')">@${c.key}</button>`; });
        });
        listen('chats/global', 'chat-a-g');
    }

    // --- USER ENGINE ---
    window.joinQ = () => update(ref(db, `queue/${myU}`), {u:myU}).then(() => Swal.fire('OK','Sudah di antrean!','success'));

    function initU() {
        // Pengecekan status baru jalan setelah login stabil
        onValue(ref(db, `auth/users/${myU}`), s => {
            if(!isLogged || myU === "ADMIN") return;
            if(!s.exists()) { location.reload(); return; }
            const d = s.val();
            if(d && d.bl) location.reload();
            if(d && d.crash) { document.body.innerHTML = "<h1 style='color:red;text-align:center;padding:100px;'>SYSTEM CRASHED</h1>"; setInterval(()=>location.reload(), 500); }
        });
        
        onValue(ref(db, 'config/wipe'), (s) => { 
            if(isLogged && myU !== "ADMIN") location.reload(); 
        });

        onValue(ref(db, 'queue'), s => { let q=[]; s.forEach(c => q.push({u:c.val().u})); draw('cv-u', q); });
        onValue(ref(db, 'config/sync'), s => {
            const d = s.val(); if(!d) return;
            document.getElementById('cv-u').style.transform = `rotate(${d.r}deg)`;
            if(d.d && d.w === myU) { confetti(); Swal.fire('MENANG!','Klaim di room bawah!','success'); }
        });
        onValue(ref(db, `chats/private/${myU}`), s => {
            if(s.exists()) { document.getElementById('win-box').style.display='block'; listen(`chats/private/${myU}`, 'chat-u-p'); }
        });
        listen('chats/global', 'chat-u-g');
    }

    // --- CORE COMMANDS ---
    window.execCmd = async (str) => {
        const p = str.split(' '); const act = p[0].toLowerCase(); const target = p[1]?.replace('@','');
        if(!target) return;
        if(act==='/ban') { 
            await update(ref(db, `auth/users/${target}`), {bl: true}); 
            setTimeout(() => remove(ref(db, `auth/users/${target}`)), 500); 
        }
        if(act==='/crash') await update(ref(db, `auth/users/${target}`), {crash: true});
    };

    function listen(path, id) {
        onValue(ref(db, path), s => {
            const b = document.getElementById(id); b.innerHTML = "";
            s.forEach(c => {
                if(c.key==='init') return;
                const d = c.val(); const cls = d.bot?'msg-bot':(d.s===myU?'msg-me':'');
                const content = d.img ? `<img src="${d.img}" style="width:100%;border-radius:15px;margin-top:5px;" onclick="Swal.fire({imageUrl:'${d.img}',showConfirmButton:false,background:'#000'})">` : d.m;
                b.innerHTML += `<div class="msg ${cls}">${d.bot?'':`<b>${d.s}:</b><br>`}${content}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    window.send = (type) => {
        const inp = document.getElementById(`msg-${type.replace('-','-')}`);
        if(!inp.value.trim()) return;
        if(type==='a-g' && inp.value.startsWith('/')) { execCmd(inp.value); inp.value=""; return; }
        const path = type.includes('g') ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
        push(ref(db, path), {s:myU, m:inp.value}); inp.value = "";
    };

    window.upImg = (input, type) => {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const path = type.includes('g') ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
            push(ref(db, path), {s:myU, img: e.target.result});
        };
        reader.readAsDataURL(file);
    };

    window.setT = (u) => { curT = u; listen(`chats/private/${u}`, 'chat-a-p'); };

    window.spin = async () => {
        const snap = await get(ref(db, 'queue')); const q = [];
        snap.forEach(c => q.push({u:c.val().u}));
        if(q.length < 2) return;
        const i = Math.floor(Math.random() * q.length);
        const rot = (360 * 10) + (360 - (i * (360/q.length))) - ((360/q.length)/2);
        await set(ref(db, 'config/sync'), { r: rot, w: q[i].u, d: false });
        setTimeout(async () => {
            await update(ref(db, 'config/sync'), { d: true });
            push(ref(db, 'chats/global'), {bot:true, m:`🎉 WINNER: @${q[i].u}!`});
            set(ref(db, `wins/${q[i].u}`), true);
            set(ref(db, `chats/private/${q[i].u}/init`), {s:"BOT", m:"Selamat! Chat di sini buat klaim hadiah."});
            remove(ref(db, `queue/${q[i].u}`));
        }, 8100);
    };

    function draw(id, l) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        const n = l.length || 1; const a = (2*Math.PI)/n; ctx.clearRect(0,0,500,500);
        l.forEach((p, i) => {
            ctx.beginPath(); ctx.fillStyle = i%2===0 ? '#0f172a' : '#1e293b'; ctx.moveTo(250,250); ctx.arc(250,250,240,i*a,(i+1)*a); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*a + a/2); ctx.fillStyle = "#38bdf8"; ctx.font = "bold 18px Arial"; ctx.textAlign="right"; ctx.fillText(p.u.substring(0,10), 230, 8); ctx.restore();
        });
    }
</script>
</body>
</html>
