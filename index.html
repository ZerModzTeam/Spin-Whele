<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT EVENT v0.1.5 - REFIXED</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #090A0F; color: #e0e0e0; overflow-x: hidden; }
        .header { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00f2fe; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); position: sticky; top: 0; z-index: 1000; }
        .main-title { font-size: 22px; font-weight: 900; color: #00f2fe; text-shadow: 0 0 10px #00f2fe; margin: 0; }
        .container { max-width: 480px; margin: 15px auto; padding: 0 15px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 25px; border: 1px solid rgba(0, 242, 254, 0.2); padding: 20px; margin-bottom: 20px; }
        
        /* WHEEL */
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 15px auto; }
        #cv-u, #cv-a { width: 100% !important; height: 100% !important; border-radius: 50%; border: 5px solid #00f2fe; transition: 7.5s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 25px; height: 42px; background: #71ff00; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; filter: drop-shadow(0 0 8px #71ff00); }

        /* CHAT SYSTEM */
        .chat-box { height: 280px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
        .msg-me { background: rgba(0, 242, 254, 0.2); border: 1px solid #00f2fe; align-self: flex-end; }
        .msg-ot { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; }
        .msg-bot { background: linear-gradient(45deg, #71ff00, #00f2fe); color: #000; font-weight: bold; align-self: center; text-align: center; width: 90%; }

        /* INPUT & BUTTON */
        input, textarea { width: 100%; padding: 16px 22px; margin-bottom: 12px; border: 1px solid rgba(0, 242, 254, 0.4); border-radius: 30px; background: rgba(0, 0, 0, 0.6); color: #71ff00; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 30px; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.95); } /* ANIMASI KLIK BALIK */
        .btn-primary { background: linear-gradient(45deg, #00f2fe, #4facfe); color: #000; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); }
        .btn-danger { background: #ff0844; color: #fff; }
        .btn-upload { border: 2px dashed #00f2fe; color: #00f2fe; padding: 12px; border-radius: 20px; text-align: center; margin-bottom: 12px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* BLACKLIST & LOGIN */
        #pg-login { position: fixed; inset: 0; background: #090a0f; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 320px; padding: 45px; background: rgba(255, 255, 255, 0.04); border-radius: 40px; border: 2px solid #00f2fe; text-align: center; }
        .bl-item { background: #000; padding: 12px; border-radius: 15px; margin-bottom: 8px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="pg-login">
    <div class="login-card">
        <h1 class="main-title">ZMT EVENT</h1>
        <div id="u-form" style="margin-top: 35px;">
            <input type="text" id="log-u" placeholder="USERNAME">
            <input type="password" id="log-p" placeholder="PASSWORD">
            <button class="btn btn-primary" onclick="auth('user')">MASUK / DAFTAR</button>
            <p onclick="setA(true)" style="color:#111; cursor:pointer; font-size:10px; margin-top:20px;">ADMIN PANEL</p>
        </div>
        <div id="a-form" style="display:none; margin-top: 35px;">
            <input type="password" id="a-key" placeholder="ADMIN MASTER KEY">
            <button class="btn btn-danger" onclick="auth('admin')">BYPASS ADMIN</button>
            <p onclick="setA(false)" style="color:#111; cursor:pointer; font-size:10px; margin-top:20px;">KEMBALI</p>
        </div>
    </div>
</div>

<div id="pg-app" style="display:none;">
    <div class="header">
        <h1 class="main-title">ZMT v0.1.5</h1>
        <button onclick="location.reload()" style="background:#ff0844; border:none; color:#fff; padding:6px 15px; border-radius:15px; font-size:10px; font-weight:bold; cursor:pointer;">LOGOUT</button>
    </div>

    <div class="container">
        <div class="card">
            <div style="font-size:11px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>USER: <span id="info-u" style="color:#71ff00;">-</span></div>
                <div>PASS: <span id="info-p" style="color:#71ff00;">-</span></div>
                <div>DEV: <span id="info-dev" style="color:#71ff00;">0</span></div>
                <div>STAT: <span id="info-stat" style="color:#71ff00;">-</span></div>
                <div style="grid-column: span 2;">IP: <span id="info-ip" style="color:#71ff00;">...</span></div>
            </div>
        </div>

        <div id="ui-user" style="display:none;">
            <div class="card"><button id="btn-join" class="btn btn-primary" onclick="join()">DAFTAR ANTRIAN SPIN</button></div>
            <div class="card">
                <div class="wheel-container"><div class="pointer"></div><canvas id="cv-u" width="500" height="500"></canvas></div>
                <p id="spin-msg" style="text-align:center; color:#71ff00; font-size:12px; font-weight:bold;">READY TO SPIN</p>
            </div>
            <div class="card">
                <div id="chat-u" class="chat-box"></div>
                <input type="text" id="msg-u" placeholder="Pesan global...">
                <button class="btn btn-primary" onclick="send('global')">KIRIM PESAN</button>
            </div>
            <div id="box-win" class="card" style="display:none; border:2px solid #71ff00;">
                <p style="color:#71ff00; font-weight:bold;">🎁 FORM KLAIM HADIAH</p>
                <div id="chat-p-u" class="chat-box" style="height:150px;"></div>
                <input type="file" id="f-u" style="display:none;" onchange="up('user')">
                <div class="btn-upload" onclick="document.getElementById('f-u').click()">🖼️ UPLOAD BUKTI (SS)</div>
                <textarea id="msg-p-u" placeholder="Detail klaim..."></textarea>
                <button class="btn btn-primary" onclick="send('private-u')">KIRIM KLAIM</button>
            </div>
        </div>

        <div id="ui-admin" style="display:none;">
            <div class="card">
                <textarea id="msg-a" placeholder="Chat / /Ban @user / /Crash @user / /Bl @user YYYY-MM-DD-HH-MM-SS"></textarea>
                <button class="btn btn-primary" onclick="handleCmd()">EXECUTE COMMAND</button>
            </div>
            <div class="card">
                <div class="wheel-container"><div class="pointer"></div><canvas id="cv-a" width="500" height="500"></canvas></div>
                <button class="btn btn-primary" onclick="spin()" style="margin-top:10px;">PUTAR SEKARANG</button>
            </div>
            <div class="card">
                <div id="chat-a" class="chat-box"></div>
            </div>
            <div class="card">
                <div id="win-tags" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;"></div>
                <div id="box-p-a" style="display:none;">
                    <b id="target-n" style="color:#00f2fe; display:block; margin-bottom:10px;"></b>
                    <div id="chat-p-a" class="chat-box" style="height:150px;"></div>
                    <input type="file" id="f-a" style="display:none;" onchange="up('admin')">
                    <div class="btn-upload" onclick="document.getElementById('f-a').click()">📂 KIRIM BUKTI TF</div>
                    <textarea id="msg-p-a" placeholder="Balas klaim..."></textarea>
                    <button class="btn btn-primary" onclick="send('private-a')">BALAS</button>
                </div>
            </div>
            <div class="card">
                <p style="font-size:10px; color:#ff0844; font-weight:bold;">BLACKLISTED LIST</p>
                <div id="bl-list"></div>
            </div>
            <button class="btn btn-danger" onclick="wipe()" style="margin-top:20px;">RESET DATABASE</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, onDisconnect } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const cfg = { 
        apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI", 
        authDomain: "spinanberhadiahzmt.firebaseapp.com", 
        databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "spinanberhadiahzmt", 
        appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c" 
    };
    const app = initializeApp(cfg); const db = getDatabase(app);
    let myU = "", myR = "", myIP = "", q = [], curT = "", imgB = null;

    async function checkBL(ip) {
        const s = await get(ref(db, `blacklist/${ip.replace(/\./g, '_')}`));
        if(s.exists()) {
            const p = s.val().until.split('-');
            const end = new Date(p[0], p[1]-1, p[2], p[3], p[4], p[5]);
            if(new Date() < end) {
                document.body.innerHTML = `<div style="background:#000;color:#fff;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;font-family:sans-serif;border:4px solid #ff0844;"><h1 style="color:#ff0844">KAMU TELAH DI BLACKLIST</h1><p>HUBUNGI ADMIN</p><p>Hingga: <b>${s.val().until}</b></p></div>`;
                return true;
            } else { await remove(ref(db, `blacklist/${ip.replace(/\./g, '_')}`)); }
        }
        return false;
    }

    window.auth = async (role) => {
        const res = await fetch('https://api.ipify.org?format=json'); const data = await res.json(); myIP = data.ip;
        if(await checkBL(myIP)) return;
        if(role === 'admin') {
            if(document.getElementById('a-key').value === "zmtxxx") { myU="ADMIN"; myR="admin"; launch("MASTER"); }
        } else {
            const u = document.getElementById('log-u').value.trim(); const p = document.getElementById('log-p').value;
            if(!u || !p) return;
            const uRef = ref(db, `auth/users/${u}`); const snap = await get(uRef);
            if(snap.exists()) {
                if(snap.val().pw === p) { 
                    if(snap.val().crash) { await update(uRef, {crash:false}); location.reload(); return; }
                    myU=u; myR="user"; launch(p); 
                }
            } else { await set(uRef, {pw: p, ip: myIP}); myU=u; myR="user"; launch(p); }
        }
    };

    function launch(pass) {
        document.getElementById('pg-login').style.display='none'; document.getElementById('pg-app').style.display='block';
        document.getElementById('info-u').innerText = myU; document.getElementById('info-p').innerText = pass;
        document.getElementById('info-ip').innerText = myIP;
        if(myR==='admin') { document.getElementById('ui-admin').style.display='block'; initA(); } 
        else { document.getElementById('ui-user').style.display='block'; initU(); handleP(myU); }
    }

    window.handleCmd = async () => {
        const v = document.getElementById('msg-a').value;
        if(v.startsWith('/Ban @')) { await remove(ref(db, `auth/users/${v.split('@')[1]}`)); }
        else if(v.startsWith('/Crash @')) { await update(ref(db, `auth/users/${v.split('@')[1]}`), {crash: true}); }
        else if(v.startsWith('/Bl @')) { 
            const p = v.split(' '); const target = p[1].replace('@','');
            const uSnap = await get(ref(db, `auth/users/${target}`));
            if(uSnap.exists()) await set(ref(db, `blacklist/${uSnap.val().ip.replace(/\./g,'_')}`), {until: p[2], user: target});
        } else { send('global-a'); }
        document.getElementById('msg-a').value = "";
    };

    window.spin = async () => {
        if(q.length < 2) return;
        const i = Math.floor(Math.random() * q.length);
        const rot = 3600 + (360 - (i * (360/q.length))) - ((360/q.length)/2);
        await set(ref(db, 'config/sync'), { r: rot, w: q[i].u, d: false });
        setTimeout(async () => { 
            await update(ref(db, 'config/sync'), { d: true }); 
            await push(ref(db, 'chats/global'), { s: "ZMT-BOT", m: `🔥 BOOM! SELAMAT @${q[i].u} MENANG SPIN!`, bot: true });
            await push(ref(db, 'wins'), { u: q[i].u });
            await remove(ref(db, `queue/${q[i].k}`)); 
        }, 7600);
    };

    function initA() {
        listen('chats/global', 'chat-a');
        onValue(ref(db, 'queue'), (s) => { q=[]; s.forEach(c => { q.push({u:c.val().u, k:c.key}); }); draw('cv-a', q); });
        onValue(ref(db, 'wins'), (s) => {
            const l = document.getElementById('win-tags'); l.innerHTML = "";
            s.forEach(c => { const n = c.val().u; l.innerHTML += `<button class="btn btn-primary" style="width:auto; padding:5px 12px; font-size:10px; margin:2px;" onclick="openP('${n}')">@${n}</button>`; });
        });
        onValue(ref(db, 'blacklist'), (s) => {
            const b = document.getElementById('bl-list'); b.innerHTML = "";
            s.forEach(c => { b.innerHTML += `<div class="bl-item">IP: ${c.key.replace(/_/g,'.')} (${c.val().user}) <button onclick="unbl('${c.key}')" style="background:#71ff00; border:none; border-radius:10px; padding:5px; font-weight:bold; cursor:pointer;">BUKA</button></div>`; });
        });
    }

    function initU() {
        listen('chats/global', 'chat-u');
        onValue(ref(db, 'queue'), (s) => { 
            let j=false; let l=[]; s.forEach(c => { l.push({u:c.val().u}); if(c.val().u===myU) j=true; });
            document.getElementById('btn-join').disabled = j;
            document.getElementById('btn-join').innerText = j ? "SUDAH TERDAFTAR" : "DAFTAR ANTRIAN SPIN";
            draw('cv-u', l);
        });
        onValue(ref(db, 'config/sync'), (s) => {
            const d = s.val(); if(!d) return; document.getElementById('cv-u').style.transform = `rotate(${d.r-90}deg)`;
            if(d.d && d.w === myU) { confetti(); Swal.fire('WINNER!', 'Isi form klaim di bawah!', 'success'); }
        });
        onValue(ref(db, 'wins'), (s) => {
            let w=false; s.forEach(c => { if(c.val().u===myU) w=true; });
            document.getElementById('box-win').style.display = w?'block':'none';
            if(w) listen(`chats/private/${myU}`, 'chat-p-u');
        });
        onValue(ref(db, `auth/users/${myU}/crash`), (s) => { if(s.val()===true) location.reload(); });
    }

    window.send = async (m) => {
        const isG = m.includes('global'); const inp = document.getElementById(isG?(myR==='admin'?'msg-a':'msg-u'):(myR==='admin'?'msg-p-a':'msg-p-u'));
        if(!inp.value && !imgB) return;
        const path = isG ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
        await push(ref(db, path), { s: myU, m: inp.value, f: imgB }); inp.value = ""; imgB = null;
    };

    function listen(p, id) {
        onValue(ref(db, p), (s) => {
            const b = document.getElementById(id); b.innerHTML = "";
            s.forEach(c => { 
                const d = c.val(); const cls = d.bot ? 'msg-bot' : (d.s===myU?'msg-me':'msg-ot');
                b.innerHTML += `<div class="msg ${cls}">${d.bot?'':`<b>${d.s}:</b> `}<br>${d.f?`<img src="${d.f}" style="width:100%; border-radius:10px;">`:''}${d.m}</div>`; 
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    window.up = (r) => {
        const f = document.getElementById(r==='admin'?'f-a':'f-u').files[0];
        const rd = new FileReader(); rd.onload = (e) => { imgB = e.target.result; Swal.fire('Ready', 'Foto siap kirim!', 'success'); }; rd.readAsDataURL(f);
    };

    window.openP = (u) => { curT=u; document.getElementById('box-p-a').style.display='block'; document.getElementById('target-n').innerText="REPLYING TO: @"+u; listen(`chats/private/${u}`, 'chat-p-a'); };
    window.unbl = (k) => remove(ref(db, `blacklist/${k}`));
    window.wipe = () => { if(confirm('RESET DATA?')) remove(ref(db, '/')); };
    window.setA = (v) => { document.getElementById('u-form').style.display = v?'none':'block'; document.getElementById('a-form').style.display = v?'block':'none'; };
    window.join = () => push(ref(db, 'queue'), {u: myU});
    function draw(id, l) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        const n = l.length || 1; const a = (2*Math.PI)/n; ctx.clearRect(0,0,500,500);
        l.forEach((p, i) => {
            ctx.beginPath(); ctx.fillStyle = i%2===0 ? '#0d1117' : '#161b22'; ctx.moveTo(250,250); ctx.arc(250,250,240,i*a,(i+1)*a); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*a + a/2); ctx.fillStyle = "#00f2fe"; ctx.font = "bold 20px Arial"; ctx.textAlign="right"; ctx.fillText(p.u.substring(0,10), 230, 8); ctx.restore();
        });
    }
    function handleP(u) {
        const r = ref(db, `presence/${u}`); const s = push(r); set(s, 1); onDisconnect(s).remove();
        onValue(ref(db, 'presence'), (snap) => { 
            const count = snap.exists() ? Object.keys(snap.val()).length : 0;
            document.getElementById('info-dev').innerText = count;
            document.getElementById('info-stat').innerText = count > 0 ? "ONLINE" : "OFFLINE";
        });
    }
</script>
</body>
</html>
