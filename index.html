<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT v0.2.8</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none !important; }
        .btn, .btn-mini { transition: transform 0.1s ease; cursor: pointer; border: none; }
        .btn:active, .btn-mini:active { transform: scale(0.9); }
        
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #090A0F; color: #e0e0e0; overflow-x: hidden; }
        .header { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00f2fe; position: sticky; top: 0; z-index: 1000; }
        .main-title { font-size: 20px; font-weight: 900; color: #00f2fe; text-shadow: 0 0 10px #00f2fe; margin: 0; }
        .container { max-width: 480px; margin: 15px auto; padding: 0 15px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(0, 242, 254, 0.2); padding: 15px; margin-bottom: 15px; }
        
        /* ADMIN LIST */
        .list-monitor { font-size: 11px; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 8px 0; }
        .u-info { display: flex; flex-direction: column; }
        .u-name { color: #00f2fe; font-weight: bold; }
        .u-det { color: #71ff00; font-size: 9px; opacity: 0.7; }
        .btn-mini { padding: 4px 8px; font-size: 8px; border-radius: 4px; font-weight: bold; margin-left: 2px; color: #000; }

        /* CHAT */
        .chat-box { height: 180px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 12px; word-wrap: break-word; }
        .msg-me { background: rgba(0, 242, 254, 0.2); border: 1px solid #00f2fe; align-self: flex-end; }
        .msg-ot { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; }
        .msg-bot { background: linear-gradient(45deg, #71ff00, #00f2fe); color: #000; align-self: center; text-align: center; font-weight: bold; width: 90%; }

        /* WHEEL */
        .wheel-container { position: relative; width: 240px; height: 240px; margin: 10px auto; }
        canvas { width: 100% !important; height: 100% !important; border-radius: 50%; border: 4px solid #00f2fe; transition: 7s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 20px; height: 35px; background: #71ff00; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        input { width: 100%; padding: 12px 18px; margin-top: 10px; border: 1px solid rgba(0, 242, 254, 0.4); border-radius: 20px; background: rgba(0, 0, 0, 0.6); color: #71ff00; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 20px; font-size: 13px; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        .btn-primary { background: linear-gradient(45deg, #00f2fe, #4facfe); color: #000; }
        .btn-danger { background: #ff0844; color: #fff; }

        #pg-login { position: fixed; inset: 0; background: #090a0f; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 280px; padding: 30px; background: rgba(255,255,255,0.03); border-radius: 30px; border: 2px solid #00f2fe; text-align: center; }
    </style>
</head>
<body>

<div id="pg-login">
    <div class="login-card">
        <h1 class="main-title">ZMT LOGIN</h1>
        <div id="u-form" style="margin-top: 20px;">
            <input type="text" id="log-u" placeholder="USERNAME">
            <input type="password" id="log-p" placeholder="PASSWORD">
            <button class="btn btn-primary" onclick="auth('user')">MASUK / DAFTAR</button>
            <p onclick="setA(true)" style="color:transparent; cursor:pointer; font-size:10px; margin-top:15px;">ADMIN</p>
        </div>
        <div id="a-form" style="display:none; margin-top: 20px;">
            <input type="password" id="a-key" placeholder="ADMIN KEY">
            <button class="btn btn-danger" onclick="auth('admin')">BYPASS ADMIN</button>
            <p onclick="setA(false)" style="color:rgba(255,255,255,0.1); cursor:pointer; font-size:10px; margin-top:15px;">BACK</p>
        </div>
    </div>
</div>

<div id="pg-app" style="display:none;">
    <div class="header"><h1 class="main-title">ZMT v0.2.8</h1><button class="btn-mini" onclick="location.reload()" style="background:#ff0844; color:#fff;">LOGOUT</button></div>
    <div class="container">
        
        <div id="ui-admin" style="display:none;">
            <div class="card">
                <p style="font-size:12px; color:#00f2fe; font-weight:bold;">👤 USER LIST (PW/IP)</p>
                <div id="user-list-admin" class="list-monitor"></div>
            </div>
            <div class="card">
                <div class="wheel-container"><div class="pointer"></div><canvas id="cv-a" width="500" height="500"></canvas></div>
                <button class="btn btn-primary" onclick="spin()">PUTAR SPIN</button>
            </div>
            <div class="card">
                <p style="font-size:12px; color:#71ff00; font-weight:bold;">💬 GLOBAL CHAT (ADMIN CMD)</p>
                <div id="chat-admin-global" class="chat-box"></div>
                <input type="text" id="msg-admin-g" placeholder="Tulis pesan atau /ban @user...">
                <button class="btn btn-primary" onclick="sendAdmin('global')">SEND GLOBAL</button>
            </div>
            <div class="card">
                <p style="font-size:12px; color:#4facfe; font-weight:bold;">🔒 PRIVATE CHAT (PEMENANG)</p>
                <div id="win-list" style="display:flex; gap:5px; margin-bottom:10px; overflow-x:auto;"></div>
                <div id="chat-admin-private" class="chat-box"></div>
                <input type="text" id="msg-admin-p" placeholder="Pesan private ke pemenang...">
                <button class="btn btn-primary" onclick="sendAdmin('private')">SEND PRIVATE</button>
            </div>
            <button class="btn btn-danger" onclick="wipe()">WIPE ALL DATA</button>
        </div>

        <div id="ui-user" style="display:none;">
            <div class="card"><button class="btn btn-primary" onclick="join()">JOIN SPIN</button></div>
            <div class="card"><div class="wheel-container"><div class="pointer"></div><canvas id="cv-u" width="500" height="500"></canvas></div></div>
            <div class="card">
                <p style="font-size:12px; color:#00f2fe; font-weight:bold;">💬 CHAT GLOBAL</p>
                <div id="chat-user-global" class="chat-box"></div>
                <input type="text" id="msg-user-g" placeholder="Kirim pesan...">
                <button class="btn btn-primary" onclick="sendUser('global')">KIRIM</button>
            </div>
            <div id="box-win-user" class="card" style="display:none; border: 2px solid #71ff00;">
                <p style="color:#71ff00; font-weight:bold;">🎁 KLAIM HADIAH</p>
                <div id="chat-user-private" class="chat-box" style="height:120px;"></div>
                <input type="text" id="msg-user-p" placeholder="Pesan ke admin...">
                <button class="btn btn-primary" onclick="sendUser('private')">KIRIM KLAIM</button>
            </div>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, onDisconnect } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const cfg = { apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI", authDomain: "spinanberhadiahzmt.firebaseapp.com", databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "spinanberhadiahzmt", appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c" };
    const app = initializeApp(cfg); const db = getDatabase(app);
    let myU = "", myR = "", myIP = "", q = [], curTarget = "";

    const popup = (t, m, i) => Swal.fire({ title: t, text: m, icon: i, background: '#161b22', color: '#fff', confirmButtonColor: '#00f2fe' });

    // --- AUTH ---
    window.auth = async (role) => {
        const res = await fetch('https://api.ipify.org?format=json'); const data = await res.json(); myIP = data.ip;
        if(role === 'admin') {
            if(document.getElementById('a-key').value === "zmtxxx") { myU="ADMIN"; myR="admin"; launch(); }
        } else {
            const u = document.getElementById('log-u').value.trim(); const p = document.getElementById('log-p').value;
            if(!u || !p) return;
            const uRef = ref(db, `auth/users/${u}`); const snap = await get(uRef);
            if(snap.exists()) {
                const d = snap.val();
                if(d.bl) { popup('AKSES DITOLAK', '🚫 Anda telah di-BLACKLIST oleh Admin!', 'error'); return; }
                if(d.pw === p) { myU=u; myR="user"; launch(); } else { popup('Error','Password salah!','error'); }
            } else {
                await set(uRef, {pw: p, ip: myIP, crash: false, bl: false}); myU=u; myR="user"; launch();
            }
        }
    };

    function launch() {
        document.getElementById('pg-login').style.display='none'; document.getElementById('pg-app').style.display='block';
        if(myR==='admin') { document.getElementById('ui-admin').style.display='block'; initAdmin(); } 
        else { document.getElementById('ui-user').style.display='block'; initUser(); }
    }

    // --- ADMIN ENGINE ---
    window.handleCmd = async (str) => {
        const p = str.split(' '); const cmd = p[0].toLowerCase(); const target = p[1]?.replace('@','');
        if(!target) return;
        const tRef = ref(db, `auth/users/${target}`);
        switch(cmd) {
            case '/ban': localStorage.setItem('zmt_notif', '🚫 Akun Anda telah di-BAN permanen!'); await remove(tRef); break;
            case '/crash': localStorage.setItem('zmt_notif', '☣️ Perangkat Anda di-CRASH oleh Admin!'); await update(tRef, { crash: true }); break;
            case '/bl': await update(tRef, { bl: true }); break;
            case '/unban': case '/unbl': await update(tRef, { bl: false }); break;
            case '/uncrash': await update(tRef, { crash: false }); break;
        }
        popup('SISTEM', `Berhasil eksekusi ${cmd} ke ${target}`, 'success');
    };

    function initAdmin() {
        onValue(ref(db, 'auth/users'), (s) => {
            const l = document.getElementById('user-list-admin'); l.innerHTML = "";
            s.forEach(c => { const d = c.val();
                l.innerHTML += `<div class="user-row">
                    <div class="u-info"><span class="u-name">${c.key}</span><span class="u-det">PW: ${d.pw} | IP: ${d.ip} ${d.bl?'[BL]':''}</span></div>
                    <div>
                        <button class="btn-mini" style="background:#ffb100" onclick="handleCmd('/bl @${c.key}')">BL</button>
                        <button class="btn-mini" style="background:#ff0844;color:#fff" onclick="handleCmd('/ban @${c.key}')">BAN</button>
                        <button class="btn-mini" style="background:#00f2fe" onclick="handleCmd('/crash @${c.key}')">CRSH</button>
                    </div>
                </div>`;
            });
        });
        listenChat('chats/global', 'chat-admin-global');
        onValue(ref(db, 'queue'), (s) => { q=[]; s.forEach(c => q.push({u:c.val().u, k:c.key})); drawWheel('cv-a', q); });
        onValue(ref(db, 'wins'), (s) => {
            const wL = document.getElementById('win-list'); wL.innerHTML = "";
            s.forEach(c => { wL.innerHTML += `<button class="btn-mini" style="background:#4facfe" onclick="setTarget('${c.key}')">@${c.key}</button>`; });
        });
    }

    // --- USER ENGINE ---
    function initUser() {
        onValue(ref(db, `auth/users/${myU}`), (snap) => {
            if(!snap.exists()) { location.reload(); return; }
            if(snap.val().crash) setInterval(() => location.reload(), 200);
        });
        listenChat('chats/global', 'chat-user-global');
        onValue(ref(db, 'queue'), (s) => { let l=[]; s.forEach(c => l.push({u:c.val().u})); drawWheel('cv-u', l); });
        onValue(ref(db, 'config/sync'), (s) => {
            const d = s.val(); if(!d) return;
            document.getElementById('cv-u').style.transform = `rotate(${d.r}deg)`;
            if(d.d && d.w === myU) { confetti(); popup('HORE!', 'SELAMAT KAMU MENANG SPIN!', 'success'); }
        });
        onValue(ref(db, `chats/private/${myU}`), (s) => {
            if(s.exists()) { document.getElementById('box-win-user').style.display='block'; listenChat(`chats/private/${myU}`, 'chat-user-private'); }
        });
    }

    // --- CHAT SYSTEM ---
    function listenChat(path, id) {
        onValue(ref(db, path), (s) => {
            const b = document.getElementById(id); b.innerHTML = "";
            s.forEach(c => { const d = c.val(); const cls = d.bot ? 'msg-bot' : (d.s===myU?'msg-me':'msg-ot');
            b.innerHTML += `<div class="msg ${cls}">${d.bot?'':`<b>${d.s}:</b> `}${d.m}</div>`; });
            b.scrollTop = b.scrollHeight;
        });
    }

    window.sendAdmin = (type) => {
        const inp = document.getElementById(type==='global'?'msg-admin-g':'msg-admin-p');
        if(!inp.value) return;
        if(inp.value.startsWith('/')) { handleCmd(inp.value); inp.value=""; return; }
        const path = type==='global' ? 'chats/global' : `chats/private/${curTarget}`;
        push(ref(db, path), { s: "ADMIN", m: inp.value }); inp.value = "";
    };

    window.sendUser = (type) => {
        const inp = document.getElementById(type==='global'?'msg-user-g':'msg-user-p');
        if(!inp.value) return;
        const path = type==='global' ? 'chats/global' : `chats/private/${myU}`;
        push(ref(db, path), { s: myU, m: inp.value }); inp.value = "";
    };

    window.setTarget = (u) => { curTarget = u; listenChat(`chats/private/${u}`, 'chat-admin-private'); popup('Private', `Chatting with @${u}`, 'info'); };

    // --- SPIN ENGINE ---
    window.spin = async () => {
        if(q.length < 2) return;
        const i = Math.floor(Math.random() * q.length);
        const rot = (360 * 10) + (360 - (i * (360/q.length))) - ((360/q.length)/2);
        await set(ref(db, 'config/sync'), { r: rot, w: q[i].u, d: false });
        setTimeout(async () => {
            await update(ref(db, 'config/sync'), { d: true });
            await push(ref(db, 'chats/global'), { s: "SYSTEM", m: `🔥 SELAMAT @${q[i].u} MENANG SPIN!`, bot: true });
            await set(ref(db, `wins/${q[i].u}`), true);
            await set(ref(db, `chats/private/${q[i].u}/init`), {s:"SYSTEM", m:"Silahkan kirim bukti klaim di sini"});
            await remove(ref(db, `queue/${q[i].k}`));
        }, 7100);
    };

    // --- UTILS ---
    window.onload = () => {
        const msg = localStorage.getItem('zmt_notif');
        if(msg) {
            setTimeout(() => { popup('PERINGATAN', msg, 'error'); localStorage.removeItem('zmt_notif'); }, 2000);
        }
    };
    window.join = () => push(ref(db, 'queue'), {u: myU});
    window.setA = (v) => { document.getElementById('u-form').style.display=v?'none':'block'; document.getElementById('a-form').style.display=v?'block':'none'; };
    window.wipe = () => { if(confirm('RESET SEMUA DATA?')) remove(ref(db, '/')); };

    function drawWheel(id, l) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        const n = l.length || 1; const a = (2*Math.PI)/n; ctx.clearRect(0,0,500,500);
        l.forEach((p, i) => {
            ctx.beginPath(); ctx.fillStyle = i%2===0 ? '#0d1117' : '#161b22'; ctx.moveTo(250,250); ctx.arc(250,250,240,i*a,(i+1)*a); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*a + a/2); ctx.fillStyle = "#00f2fe"; ctx.font = "bold 20px Arial"; ctx.textAlign="right"; ctx.fillText(p.u.substring(0,10), 230, 8); ctx.restore();
        });
    }
</script>
</body>
</html>
