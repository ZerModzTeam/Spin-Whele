<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT EVENT - v.0.0.7 (GOD MODE)</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #8b5cf6; --g: #fbbf24; --d: #020308; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--d); color: #fff; overflow-x: hidden; min-height: 100vh; }
        .nebula-bg { position: fixed; inset: 0; z-index: -1; background: #020308; }
        .vapor { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: drift 20s infinite alternate; }
        .v1 { width: 400px; height: 400px; background: #4f46e5; top: -10%; left: -10%; }
        .v2 { width: 400px; height: 400px; background: #9333ea; bottom: -10%; right: -10%; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(50px, 50px); } }
        .capsule-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 30px; padding: 20px; margin-bottom: 20px; }
        .btn-capsule { width: 100%; padding: 15px; border-radius: 999px; border: none; color: #fff; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-p { background: linear-gradient(90deg, #6366f1, #a855f7); }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 15px 20px; color: #fff; border-radius: 25px; margin-bottom: 10px; outline: none; }
        .chat-box { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 13px; max-width: 80%; }
        .me { background: var(--p); align-self: flex-end; }
        .other { background: #333; align-self: flex-start; }
        .marquee-capsule { background: rgba(0,0,0,0.5); border-radius: 999px; padding: 10px; border: 1px solid var(--border); color: var(--g); font-weight: 800; margin: 15px 0; overflow: hidden; text-align: center; }
        .wheel-container { position: relative; width: 260px; height: 260px; margin: 10px auto; border: 5px solid var(--glass); border-radius: 50%; }
        canvas { width: 100%; height: 100%; transition: 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .needle { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #ff4757; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; border: 2px solid #fff; }
    </style>
</head>
<body>
<div class="nebula-bg"><div class="vapor v1"></div><div class="vapor v2"></div></div>

<div id="gate" style="position:fixed; inset:0; z-index:1000; background:rgba(2,3,8,0.95); display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="capsule-card" style="width:100%; max-width:350px; text-align:center;">
        <h1 style="margin:0; color:var(--p); letter-spacing:3px;">ZMT EVENT</h1>
        <div id="loginForm">
            <input type="text" id="uIn" placeholder="Username" style="margin-top:20px;">
            <input type="password" id="pIn" placeholder="Password">
            <button class="btn-capsule btn-p" onclick="login()">MASUK / DAFTAR</button>
            <p id="adminBtn" onclick="switchToAdmin()" style="font-size:11px; opacity:0.4; margin-top:20px; cursor:pointer;">Admin Login</p>
        </div>
        <div id="adminForm" style="display:none;">
            <input type="password" id="aKey" placeholder="Admin Master Key" style="margin-top:20px;">
            <button class="btn-capsule" style="background:var(--g); color:#000;" onclick="loginAdmin()">VERIFY ADMIN</button>
            <p onclick="switchToUser()" style="font-size:11px; opacity:0.4; margin-top:20px; cursor:pointer;">Kembali</p>
        </div>
    </div>
</div>

<div id="app" style="display:none; padding:15px; max-width:500px; margin:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="color:var(--g); font-weight:800;">ZMT ENGINE v7</span>
        <button onclick="logout()" style="background:none; border:none; color:#ff4757; font-weight:800;">LOGOUT</button>
    </div>

    <div class="marquee-capsule" id="mqText">WELCOME TO ZMT EVENT...</div>

    <div id="uiAdmin" style="display:none;">
        <div class="capsule-card">
            <input type="text" placeholder="Ganti Running Text..." onchange="updateMQ(this.value)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-capsule" style="background:#10b981" onclick="setReg(true)">BUKA</button>
                <button class="btn-capsule" style="background:#ef4444" onclick="setReg(false)">TUTUP</button>
            </div>
            <button class="btn-capsule" style="background:#000; border:1px solid red; margin-top:10px; font-size:11px;" onclick="nuclearReset()">☢️ RESET ALL (KEEP ADMIN)</button>
        </div>
        <div class="capsule-card" style="text-align:center;">
            <div class="wheel-container"><div class="needle"></div><canvas id="wheelAdmin" width="500" height="500"></canvas></div>
            <button class="btn-capsule btn-p" onclick="spin()">SPIN SEKARANG</button>
        </div>
        <div class="capsule-card">
            <h4>Antrian (@<span id="qCount">0</span>)</h4>
            <div id="qList" style="max-height:150px; overflow-y:auto;"></div>
        </div>
        <div class="capsule-card">
            <h4>Chat Pemenang</h4>
            <div id="chatPemenangList"></div>
            <div id="adminChatArea" style="display:none; margin-top:15px;">
                <b id="chatWith" style="color:var(--g)"></b>
                <div id="boxAdmin" class="chat-box"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="msgAdmin" placeholder="Balas...">
                    <button class="btn-capsule btn-p" style="width:80px;" onclick="send('admin')">KIRIM</button>
                </div>
            </div>
        </div>
    </div>

    <div id="uiUser" style="display:none;">
        <div class="capsule-card"><button class="btn-capsule btn-p" id="joinBtn" onclick="join()">DAFTAR SPIN</button></div>
        <div class="capsule-card" style="text-align:center;">
            <div class="wheel-container"><div class="needle"></div><canvas id="wheelUser" width="500" height="500"></canvas></div>
        </div>
        <div id="winArea" class="capsule-card" style="display:none; border:2px solid var(--g);">
            <h3 style="color:var(--g); text-align:center; margin:0 0 10px 0;">🏆 KAMU MENANG!</h3>
            <div id="boxUser" class="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msgUser" placeholder="Kirim pesan ke admin...">
                <button class="btn-capsule btn-p" style="width:80px;" onclick="send('user')">KIRIM</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI",
        authDomain: "spinanberhadiahzmt.firebaseapp.com",
        databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "spinanberhadiahzmt",
        appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let myID = ""; let myRole = ""; let items = []; let rot = 0; let activeChat = "";

    // --- PROTEKSI TUTUP REG ---
    onValue(ref(db, 'config/reg'), (s) => {
        if(s.val() === false && myRole === 'user') {
            logout();
        }
    });

    // --- SYSTEM LOGIN ---
    window.switchToAdmin = () => { document.getElementById('loginForm').style.display='none'; document.getElementById('adminForm').style.display='block'; };
    window.switchToUser = () => { document.getElementById('loginForm').style.display='block'; document.getElementById('adminForm').style.display='none'; };

    window.login = async () => {
        const u = document.getElementById('uIn').value.trim().toLowerCase();
        const p = document.getElementById('pIn').value;
        if(u.length < 3 || p.length < 1) return Swal.fire("Isi Lengkap!");

        const regSnap = await get(ref(db, 'config/reg'));
        if(regSnap.val() === false) return Swal.fire("REGISTRASI SEDANG DI TUTUP OLEH ADMIN SILAHKAN HUBUNGI DI GRUP");

        const userRef = ref(db, `auth/users/${u}`);
        const snap = await get(userRef);
        if(snap.exists()) {
            if(snap.val().pw !== p) return Swal.fire("Password Salah!");
        } else {
            await set(userRef, {pw: p});
        }
        myID = u; myRole = "user"; start();
    };

    window.loginAdmin = () => {
        if(document.getElementById('aKey').value === "zmtxxx") {
            myID = "MASTER_ADMIN"; myRole = "admin"; start();
        } else { Swal.fire("Key Salah!"); }
    };

    function start() {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        if(myRole === 'admin') { document.getElementById('uiAdmin').style.display='block'; initAdmin(); }
        else { document.getElementById('uiUser').style.display='block'; initUser(); }
    }

    // --- ADMIN ENGINE ---
    window.setReg = (v) => set(ref(db, 'config/reg'), v);
    window.updateMQ = (v) => set(ref(db, 'config/marquee'), v);

    window.nuclearReset = async () => {
        const res = await Swal.fire({ title: 'RESET ALL?', text: "Hapus semua akun user & data? (Admin Aman)", icon: 'warning', showCancelButton: true });
        if(res.isConfirmed) {
            await set(ref(db, 'config/reg'), false);
            await remove(ref(db, 'q'));
            await remove(ref(db, 'wins'));
            await remove(ref(db, 'chats'));
            await remove(ref(db, 'auth/users')); // Cuma hapus folder users, folder admin aman
            Swal.fire("Sistem Dibersihkan!");
        }
    };

    function initAdmin() {
        onValue(ref(db, 'q'), (s) => {
            items = []; let html = "";
            s.forEach(c => { items.push({u:c.val().u, k:c.key}); html += `<div class="q-item"><span>@${c.val().u}</span><button onclick="kick('${c.key}')" style="color:red; background:none; border:none;">X</button></div>`; });
            document.getElementById('qList').innerHTML = html;
            document.getElementById('qCount').innerText = items.length;
            drawWheel('wheelAdmin');
        });
        onValue(ref(db, 'wins'), (s) => {
            let html = ""; s.forEach(c => { html += `<button class="btn-capsule" style="margin-bottom:5px; background:rgba(255,255,255,0.1);" onclick="openChat('${c.val().u}')">Chat @${c.val().u}</button>`; });
            document.getElementById('chatPemenangList').innerHTML = html;
        });
    }

    // --- USER ENGINE ---
    function initUser() {
        onValue(ref(db, 'q'), (s) => {
            items = []; let joined = false;
            s.forEach(c => { items.push({u:c.val().u}); if(c.val().u === myID) joined = true; });
            const btn = document.getElementById('joinBtn');
            btn.innerText = joined ? "SUDAH TERDAFTAR ✅" : "DAFTAR SPIN";
            btn.disabled = joined;
            drawWheel('wheelUser');
        });
        onValue(ref(db, 'wins'), (s) => {
            let win = false; s.forEach(c => { if(c.val().u === myID) win = true; });
            document.getElementById('winArea').style.display = win ? 'block' : 'none';
            if(win) listenChat(myID, 'boxUser');
        });
    }

    // --- SHARED FEATURES ---
    window.drawWheel = (id) => {
        const c = document.getElementById(id); if(!c) return;
        const ctx = c.getContext('2d'); const n = items.length || 1; const arc = (2*Math.PI)/n;
        ctx.clearRect(0,0,500,500);
        items.forEach((it, i) => {
            ctx.beginPath(); ctx.fillStyle = `hsl(${i*(360/n)}, 70%, 50%)`;
            ctx.moveTo(250,250); ctx.arc(250,250,245,i*arc,(i+1)*arc); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc + arc/2);
            ctx.fillStyle="#fff"; ctx.font="bold 25px Sans"; ctx.fillText(it.u.substring(0,6), 130, 10); ctx.restore();
        });
    };

    window.spin = () => {
        if(items.length < 2) return Swal.fire("Minimal 2 orang!");
        const winIdx = Math.floor(Math.random() * items.length);
        const winner = items[winIdx];
        rot += 3600 + (360 - (winIdx * (360/items.length)));
        document.getElementById('wheelAdmin').style.transform = `rotate(${rot}deg)`;
        setTimeout(async () => {
            confetti();
            await push(ref(db, 'wins'), {u: winner.u});
            await remove(ref(db, `q/${winner.k}`));
            Swal.fire("Pemenang: " + winner.u);
        }, 6000);
    };

    window.openChat = (u) => { activeChat = u; document.getElementById('adminChatArea').style.display='block'; document.getElementById('chatWith').innerText = "Chat: @"+u; listenChat(u, 'boxAdmin'); };
    
    function listenChat(u, boxID) {
        onValue(ref(db, `chats/${u}`), (s) => {
            const b = document.getElementById(boxID); b.innerHTML = "";
            s.forEach(c => { b.innerHTML += `<div class="msg ${c.val().s===myID?'me':'other'}">${c.val().t}</div>`; });
            b.scrollTop = b.scrollHeight;
        });
    }

    window.send = async (role) => {
        const t = (role === 'admin') ? activeChat : myID;
        const inp = document.getElementById(role === 'admin' ? 'msgAdmin' : 'msgUser');
        if(!inp.value.trim()) return;
        await push(ref(db, `chats/${t}`), { s: myID, t: inp.value });
        inp.value = "";
    };

    window.kick = (k) => remove(ref(db, `q/${k}`));
    window.logout = () => { location.reload(); };
    onValue(ref(db, 'config/marquee'), s => document.getElementById('mqText').innerText = s.val() || "WELCOME");
</script>
</body>
</html>
