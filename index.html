<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT EVENT - v.0.0.4</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #8b5cf6; --g: #fbbf24; --d: #020308; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--d); color: #fff; overflow-x: hidden; min-height: 100vh; }
        .nebula-bg { position: fixed; inset: 0; z-index: -1; background: #020308; overflow: hidden; }
        .vapor { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.35; animation: drift 20s infinite alternate; }
        .v1 { width: 500px; height: 300px; background: #4f46e5; top: -10%; left: -5%; }
        .v2 { width: 400px; height: 600px; background: #9333ea; bottom: -10%; right: -5%; animation-delay: -5s; }
        @keyframes drift { from { transform: translate(0,0) rotate(0deg); } to { transform: translate(100px, 80px) rotate(45deg); } }
        .capsule-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 35px; padding: 25px; margin-bottom: 20px; }
        .btn-capsule { width: 100%; padding: 16px; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,0.08); color: #fff; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-p { background: linear-gradient(90deg, #6366f1, #a855f7); border: none; }
        .marquee-capsule { background: rgba(0,0,0,0.4); border-radius: 999px; padding: 12px 25px; border: 1px solid var(--border); color: var(--g); font-weight: 800; margin: 20px 0; overflow: hidden; }
        .mq-inner { display: inline-block; white-space: nowrap; animation: slide 15s linear infinite; }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 25px auto; border: 8px solid var(--glass); border-radius: 50%; }
        canvas { width: 100%; height: 100%; border-radius: 50%; transition: 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .needle { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 35px; height: 45px; background: #ff4757; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 100; border: 2px solid #fff; }
        .q-item { background: rgba(255,255,255,0.03); border-radius: 999px; padding: 8px 15px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 12px; }
    </style>
</head>
<body>
<div class="nebula-bg"><div class="vapor v1"></div><div class="vapor v2"></div></div>
<div id="gate" style="position:fixed; inset:0; z-index:1000; background:rgba(2,3,8,0.9); display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(15px);">
    <div class="capsule-card" style="width:100%; max-width:380px; text-align:center;">
        <h1 style="font-weight:900; letter-spacing:4px; color:var(--p); margin:0;">ZMT EVENT</h1>
        <div id="loginUser">
            <input type="text" id="uIn" placeholder="Username" style="width:100%; background:rgba(0,0,0,0.4); border:1px solid var(--border); padding:16px; color:#fff; border-radius:30px; margin:20px 0 10px;">
            <button class="btn-capsule btn-p" onclick="login('user')">Masuk Event</button>
            <p onclick="toggleGate()" style="margin-top:25px; font-size:11px; opacity:0.4; cursor:pointer;">Admin Access</p>
        </div>
        <div id="loginAdmin" style="display:none;">
            <input type="password" id="aKey" placeholder="Admin Key" style="width:100%; background:rgba(0,0,0,0.4); border:1px solid var(--border); padding:16px; color:#fff; border-radius:30px; margin:20px 0 10px;">
            <button class="btn-capsule btn-p" style="background:var(--g); color:#000;" onclick="login('admin')">Verify Master</button>
            <p onclick="toggleGate()" style="margin-top:20px; font-size:11px; opacity:0.4; cursor:pointer;">Kembali</p>
        </div>
    </div>
</div>

<div id="app" style="display:none; padding:15px; max-width:550px; margin:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="color:var(--g); font-weight:800; font-size:12px;">ZMT ENGINE</div>
        <button onclick="logout()" style="background:none; border:none; color:#ff4757; font-weight:800; font-size:11px;">LOGOUT</button>
    </div>
    
    <div class="marquee-capsule"><div class="mq-inner" id="mqText">WELCOME TO ZMT EVENT...</div></div>

    <div id="uiAdmin" style="display:none;">
        <div class="capsule-card">
            <h4>Control Panel</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-capsule" onclick="setReg(true)" style="color:#10b981;">BUKA REG</button>
                <button class="btn-capsule" onclick="setReg(false)" style="color:#ef4444;">TUTUP REG</button>
            </div>
            <button class="btn-capsule" style="margin-top:10px; font-size:11px; background:#ef4444;" onclick="hardReset()">☢️ NUCLEAR RESET</button>
        </div>
        <div class="capsule-card" style="text-align:center;">
            <div class="wheel-container"><div class="needle"></div><canvas id="wheel" width="500" height="500"></canvas></div>
            <button class="btn-capsule btn-p" onclick="spin()">SPIN</button>
        </div>
        <div class="capsule-card">
            <h4>Antrian Peserta (@<span id="qCount">0</span>)</h4>
            <div id="qList"></div>
        </div>
    </div>

    <div id="uiUser" style="display:none;">
        <div class="capsule-card"><button class="btn-capsule btn-p" id="joinBtn" onclick="join()">DAFTAR SPIN</button></div>
        <div class="capsule-card" style="text-align:center;">
            <div class="wheel-container"><div class="needle"></div><canvas id="wheelUser" width="500" height="500"></canvas></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const fb = { apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI", authDomain: "spinanberhadiahzmt.firebaseapp.com", databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "spinanberhadiahzmt", appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c" };
    const app = initializeApp(fb); const db = getDatabase(app);
    let myID = ""; let items = []; let rot = 0; let regStatus = true;

    // --- LISTENER STATUS REGISTRASI ---
    onValue(ref(db, 'config/reg'), (s) => {
        regStatus = s.val() !== false;
    });

    // --- LISTENER RESET (SEKALI PUKUL) ---
    onValue(ref(db, 'config/reset_event'), (s) => {
        if(s.exists() && s.val() === true && myID !== "") {
            Swal.fire({ title: "RESET!", text: "Sistem telah dibersihkan oleh admin", icon: "info", timer: 2000, showConfirmButton: false });
            setTimeout(() => logout(), 2000);
        }
    });

    window.login = (role) => {
        if(role === 'admin') {
            if(document.getElementById('aKey').value === "zmtxxx") { localStorage.setItem('zmt_role', 'admin'); start("MASTER_ADMIN"); }
            else Swal.fire("Key Salah!");
        } else {
            const u = document.getElementById('uIn').value.trim();
            if(u.length < 2) return Swal.fire("Isi nama dulu!");
            localStorage.setItem('zmt_role', 'user');
            start(u);
        }
    };

    function start(u) {
        myID = u; localStorage.setItem('zmt_user', u);
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        if(localStorage.getItem('zmt_role') === 'admin') { document.getElementById('uiAdmin').style.display='block'; runAdmin(); }
        else { document.getElementById('uiUser').style.display='block'; runUser(); }
    }

    // --- LOGIKA DAFTAR (FIX SESUAI MAU BOSS) ---
    window.join = async () => {
        // Cek dulu ke database status terbarunya
        const snap = await get(ref(db, 'config/reg'));
        const isOpen = snap.val() !== false;

        if (!isOpen) {
            // NOTIF SESUAI PERMINTAAN BOSS
            Swal.fire({
                title: "REGISTRASI SEDANG DI TUTUP OLEH ADMIN SILAHKAN HUBUNGI DI GRUP",
                icon: "warning",
                confirmButtonText: "OK",
                confirmButtonColor: "#8b5cf6"
            });
            return;
        }

        // Kalau buka, baru daftar
        push(ref(db, 'q'), {u: myID});
        Swal.fire({ title: "BERHASIL!", text: "Kamu sudah masuk antrian", icon: "success", timer: 1500, showConfirmButton: false });
    };

    window.hardReset = async () => {
        if(confirm("Hapus semua data & keluarkan semua user?")) {
            await set(ref(db, 'config/reset_event'), true); // Sinyal kick
            await remove(ref(db, 'q'));
            await remove(ref(db, 'wins'));
            await remove(ref(db, 'chats'));
            setTimeout(async () => {
                await set(ref(db, 'config/reset_event'), false); // Matikan sinyal kick
                logout();
            }, 1500);
        }
    };

    window.setReg = (v) => set(ref(db, 'config/reg'), v);

    function runAdmin() {
        onValue(ref(db, 'q'), (s) => {
            items = []; const list = document.getElementById('qList'); list.innerHTML = "";
            s.forEach(c => { items.push({u:c.val().u, k:c.key}); list.innerHTML += `<div class="q-item"><span>@${c.val().u}</span><button onclick="kick('${c.key}')" style="color:red; background:none; border:none;">KICK</button></div>`; });
            draw('wheel');
            document.getElementById('qCount').innerText = items.length;
        });
    }

    function runUser() {
        onValue(ref(db, 'q'), (s) => {
            items = []; let joined = false;
            s.forEach(c => { items.push({u:c.val().u}); if(c.val().u === myID) joined = true; });
            document.getElementById('joinBtn').disabled = joined;
            if(joined) document.getElementById('joinBtn').innerText = "SUDAH TERDAFTAR ✅";
            draw('wheelUser');
        });
    }

    window.draw = (id) => {
        const c = document.getElementById(id); if(!c) return;
        const ctx = c.getContext('2d'); const n = items.length || 1; const arc = (2*Math.PI)/n;
        ctx.clearRect(0,0,500,500);
        items.forEach((it, i) => {
            ctx.beginPath(); ctx.fillStyle = `hsl(${i*(360/n)}, 65%, 45%)`;
            ctx.moveTo(250,250); ctx.arc(250,250,245,i*arc,(i+1)*arc); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc+arc/2);
            ctx.fillStyle="#fff"; ctx.font="800 20px Sans"; ctx.fillText(it.u.substring(0,7), 120, 10); ctx.restore();
        });
    };

    window.spin = () => {
        if(items.length < 2) return Swal.fire("Minimal 2 orang!");
        const idx = Math.floor(Math.random() * items.length);
        const win = items[idx];
        rot += 3600 + (360 - (idx * (360/items.length)));
        document.getElementById('wheel').style.transform = `rotate(${rot}deg)`;
        setTimeout(async () => {
            confetti();
            await push(ref(db, 'wins'), {u: win.u});
            await remove(ref(db, `q/${win.k}`));
            Swal.fire("Pemenang: " + win.u);
        }, 6000);
    };

    window.kick = (k) => remove(ref(db, `q/${k}`));
    window.logout = () => { localStorage.clear(); location.reload(); };
    window.toggleGate = () => {
        document.getElementById('loginUser').style.display = document.getElementById('loginUser').style.display === 'none' ? 'block' : 'none';
        document.getElementById('loginAdmin').style.display = document.getElementById('loginAdmin').style.display === 'none' ? 'block' : 'none';
    };
    onValue(ref(db, 'config/marquee'), s => document.getElementById('mqText').innerText = s.val() || "ZMT EVENT RUNNING...");
</script>
</body>
</html>
