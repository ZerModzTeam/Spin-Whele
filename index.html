<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT v0.2.5</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* NEBULA BACKGROUND ANIMATION */
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at bottom, #0d1d31 0%, #0c0d13 100%);
            background-attachment: fixed; color: #e0e0e0; overflow-x: hidden;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                        linear-gradient(45deg, rgba(79, 172, 254, 0.1) 0%, rgba(0, 242, 254, 0.1) 100%);
            z-index: -1; animation: nebulaMove 20s infinite alternate;
        }
        @keyframes nebulaMove { from { transform: scale(1); } to { transform: scale(1.1); } }

        * { -webkit-tap-highlight-color: transparent; outline: none !important; box-sizing: border-box; }
        .btn { transition: 0.1s; cursor: pointer; border: none; font-weight: 800; border-radius: 15px; }
        .btn:active { transform: scale(0.95); }
        
        .header { background: rgba(0,0,0,0.8); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00f2fe; backdrop-filter: blur(10px); position: sticky; top:0; z-index:100; }
        .container { max-width: 450px; margin: 10px auto; padding: 0 15px; }
        .card { background: rgba(255, 255, 255, 0.05); border-radius: 20px; border: 1px solid rgba(0, 242, 254, 0.2); padding: 15px; margin-bottom: 15px; backdrop-filter: blur(15px); }
        
        /* CHAT STYLE */
        .chat-box { height: 180px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 12px; line-height: 1.4; }
        .msg-me { background: rgba(0, 242, 254, 0.2); border: 1px solid #00f2fe; align-self: flex-end; }
        .msg-ot { background: rgba(255,255,255,0.1); align-self: flex-start; }
        .msg-bot { background: #71ff00; color: #000; align-self: center; text-align: center; width: 100%; font-weight: bold; }
        .msg img { width: 100%; border-radius: 8px; margin-top: 5px; border: 1px solid #00f2fe; }

        /* WHEEL */
        .wheel-box { position: relative; width: 230px; height: 230px; margin: 10px auto; }
        canvas { width: 100% !important; height: 100% !important; border-radius: 50%; border: 5px solid #00f2fe; transition: 7s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 20px #00f2fe; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 30px; background: #71ff00; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        input { width: 100%; padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.5); border: 1px solid #00f2fe; color: #71ff00; margin-top: 5px; }
        
        /* LOGIN UI */
        #pg-login { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 320px; padding: 30px; border: 2px solid #00f2fe; border-radius: 30px; background: rgba(10,10,20,0.9); text-align: center; box-shadow: 0 0 30px rgba(0, 242, 254, 0.3); }
    </style>
</head>
<body>

<script>
    const checkKick = () => {
        const msg = sessionStorage.getItem('ZMT_KICK_MSG');
        if (msg) {
            sessionStorage.removeItem('ZMT_KICK_MSG');
            setTimeout(() => {
                Swal.fire({ title: 'SISTEM ZMT', text: msg, icon: 'error', background: '#111', color: '#fff' });
            }, 1000);
        }
    }
    window.addEventListener('load', checkKick);
</script>

<div id="pg-login">
    <div class="login-card">
        <h1 style="color:#00f2fe; margin:0;">ZMT LOGIN</h1>
        <p style="color:#555; font-size:12px; margin-bottom:20px;">v0.2.5 (BETA - STABLE)</p>
        <div id="u-form">
            <input type="text" id="log-u" placeholder="USERNAME">
            <input type="password" id="log-p" placeholder="PASSWORD">
            <button class="btn" style="background:#00f2fe; width:100%; padding:15px; margin-top:15px;" onclick="auth('user')">MASUK / DAFTAR</button>
            <p onclick="setA(true)" style="color:transparent; font-size:10px; margin-top:20px;">ADMIN</p>
        </div>
        <div id="a-form" style="display:none;">
            <input type="password" id="a-key" placeholder="ADMIN KEY">
            <button class="btn" style="background:#ff0844; color:#fff; width:100%; padding:15px; margin-top:15px;" onclick="auth('admin')">BYPASS ADMIN</button>
            <p onclick="setA(false)" style="color:#444; font-size:10px; margin-top:20px;">KEMBALI</p>
        </div>
    </div>
</div>

<div id="pg-app" style="display:none;">
    <div class="header">
        <span style="font-weight:900; color:#00f2fe;">ZMT v0.2.5</span>
        <button class="btn" onclick="location.reload()" style="background:#ff0844; padding:5px 12px; color:#fff; font-size:10px;">LOGOUT</button>
    </div>

    <div class="container">
        <div id="ui-admin" style="display:none;">
            <div class="card">
                <p style="font-size:12px; color:#00f2fe; font-weight:bold;">👤 USER DATABASE (FULL DATA)</p>
                <div id="admin-user-list" style="max-height:150px; overflow-y:auto; font-size:10px; background:rgba(0,0,0,0.4); padding:10px; border-radius:10px;"></div>
                <div class="chat-box" id="chat-a-g" style="margin-top:10px;"></div>
                <input type="text" id="msg-a-g" placeholder="Ketik pesan atau /ban @user...">
                <button class="btn" style="background:#00f2fe; width:100%; padding:10px; margin-top:5px;" onclick="send('a-g')">KIRIM / CMD</button>
            </div>
            <div class="card">
                <div class="wheel-box"><div class="pointer"></div><canvas id="cv-a" width="500" height="500"></canvas></div>
                <button class="btn" style="background:#71ff00; width:100%; padding:15px;" onclick="spin()">PUTAR SEKARANG</button>
            </div>
            <div class="card">
                <p style="font-size:12px; color:#ffb100; font-weight:bold;">🏆 PLIST PEMENANG (PRIVATE CHAT)</p>
                <div id="plist" style="display:flex; gap:5px; margin-bottom:10px; overflow-x:auto;"></div>
                <div class="chat-box" id="chat-a-p"></div>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <label style="background:#4facfe; padding:10px; border-radius:50%; cursor:pointer;">📷<input type="file" hidden accept="image/*" onchange="upImg(this, 'a-p')"></label>
                    <input type="text" id="msg-a-p" placeholder="Chat private..." style="margin-top:0;">
                    <button class="btn" onclick="send('a-p')" style="background:#00f2fe; padding:0 15px;">SEND</button>
                </div>
            </div>
        </div>

        <div id="ui-user" style="display:none;">
            <div class="card"><button class="btn" style="background:#00f2fe; width:100%; padding:15px;" onclick="join()">DAFTAR ANTREAN</button></div>
            <div class="card"><div class="wheel-box"><div class="pointer"></div><canvas id="cv-u" width="500" height="500"></canvas></div></div>
            <div class="card">
                <p style="font-size:12px; color:#00f2fe; font-weight:bold;">💬 CHAT GLOBAL</p>
                <div class="chat-box" id="chat-u-g"></div>
                <input type="text" id="msg-u-g" placeholder="Tulis pesan...">
                <button class="btn" style="background:#00f2fe; width:100%; padding:12px; margin-top:5px;" onclick="send('u-g')">KIRIM</button>
            </div>
            <div id="box-win" class="card" style="display:none; border: 2px solid #71ff00;">
                <p style="color:#71ff00; font-weight:bold;">🎁 KLAIM HADIAH</p>
                <div class="chat-box" id="chat-u-p" style="height:120px;"></div>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <label style="background:#4facfe; padding:10px; border-radius:50%; cursor:pointer;">📷<input type="file" hidden accept="image/*" onchange="upImg(this, 'u-p')"></label>
                    <input type="text" id="msg-u-p" placeholder="Kirim bukti..." style="margin-top:0;">
                    <button class="btn" onclick="send('u-p')" style="background:#00f2fe; padding:0 15px;">KIRIM</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const cfg = { apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI", authDomain: "spinanberhadiahzmt.firebaseapp.com", databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "spinanberhadiahzmt", appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c" };
    const app = initializeApp(cfg); const db = getDatabase(app);
    let myU = "", myR = "", myIP = "", q = [], curT = "";

    // --- AUTH ---
    window.auth = async (role) => {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json(); myIP = ipData.ip;

        if(role==='admin') {
            if(document.getElementById('a-key').value === "zmtxxx") { myU="ADMIN"; myR="admin"; start(); }
            return;
        }

        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value;
        if(!u || !p) return;

        const uRef = ref(db, `auth/users/${u}`);
        const snap = await get(uRef);

        if(snap.exists()){
            const d = snap.val();
            if(d.bl) { Swal.fire('BLACKLIST','IP/Akun Anda diblokir!','error'); return; }
            if(d.pw === p) { myU=u; myR="user"; start(); } else { Swal.fire('GAGAL','Password salah!','error'); }
        } else {
            const cleanIP = myIP.replace(/\./g, '_');
            const ipSnap = await get(ref(db, `auth/ips/${cleanIP}`));
            if(ipSnap.exists()) { Swal.fire('SECURITY','1 IP hanya boleh 1 akun!','warning'); return; }
            await set(uRef, {pw:p, ip:myIP, bl:false, crash:false});
            await set(ref(db, `auth/ips/${cleanIP}`), u);
            myU=u; myR="user"; start();
        }
    };

    function start() {
        document.getElementById('pg-login').style.display='none';
        document.getElementById('pg-app').style.display='block';
        if(myR==='admin') { document.getElementById('ui-admin').style.display='block'; initA(); }
        else { document.getElementById('ui-user').style.display='block'; initU(); }
    }

    // --- ADMIN CMD ---
    window.cmd = async (str) => {
        const parts = str.split(' '); const act = parts[0].toLowerCase(); const target = parts[1]?.replace('@','');
        if(!target) return;
        const tRef = ref(db, `auth/users/${target}`);
        
        if(act === '/ban') { await update(tRef, {k: '🚫 Akun Anda di-BAN!'}); setTimeout(()=>remove(tRef), 1000); }
        if(act === '/crash') await update(tRef, {k: '☣️ Perangkat CRASH!', crash:true});
        if(act === '/bl') await update(tRef, {k: '🚫 Anda di-BLACKLIST!', bl:true});
        if(act === '/unbl') await update(tRef, {bl:false, k:null});
        if(act === '/uncrash') await update(tRef, {crash:false, k:null});
        Swal.fire('OK', `Command ${act} ke ${target} sukses!`, 'success');
    };

    function initA() {
        onValue(ref(db, 'auth/users'), s => {
            const l = document.getElementById('admin-user-list'); l.innerHTML = "";
            s.forEach(c => { const d = c.val(); l.innerHTML += `<div style="border-bottom:1px solid #222; padding:5px"><b>@${c.key}</b> | PW: ${d.pw} | IP: ${d.ip} | [${d.bl?'BL':'OK'}] [${d.crash?'CRASH':'OK'}]</div>`; });
        });
        onValue(ref(db, 'queue'), s => { q=[]; s.forEach(c => q.push({u:c.val().u, k:c.key})); draw('cv-a', q); });
        onValue(ref(db, 'wins'), s => {
            const l = document.getElementById('plist'); l.innerHTML = "";
            s.forEach(c => { l.innerHTML += `<button class="btn" style="background:#ffb100; padding:5px 10px; font-size:10px;" onclick="setT('${c.key}')">@${c.key}</button>`; });
        });
        listen('chats/global', 'chat-a-g');
    }

    function initU() {
        onValue(ref(db, `auth/users/${myU}`), s => {
            if(!s.exists()) { sessionStorage.setItem('ZMT_KICK_MSG', '🚫 Akun Anda telah dihapus!'); location.reload(); return; }
            const d = s.val();
            if(d.k) { sessionStorage.setItem('ZMT_KICK_MSG', d.k); location.reload(); return; }
            if(d.crash) setInterval(()=>location.reload(), 150);
        });
        onValue(ref(db, 'queue'), s => { let l=[]; s.forEach(c => l.push({u:c.val().u})); draw('cv-u', l); });
        onValue(ref(db, 'config/sync'), s => {
            const d = s.val(); if(!d) return;
            document.getElementById('cv-u').style.transform = `rotate(${d.r}deg)`;
            if(d.d && d.w === myU) { confetti(); Swal.fire('MENANG!','Klaim hadiah di bawah!','success'); }
        });
        onValue(ref(db, `chats/private/${myU}`), s => {
            if(s.exists()) { document.getElementById('box-win').style.display='block'; listen(`chats/private/${myU}`, 'chat-u-p'); }
        });
        listen('chats/global', 'chat-u-g');
    }

    // --- CHAT & MEDIA ---
    function listen(path, id) {
        onValue(ref(db, path), s => {
            const b = document.getElementById(id); b.innerHTML = "";
            s.forEach(c => {
                const d = c.val(); const cls = d.bot?'msg-bot':(d.s===myU?'msg-me':'msg-ot');
                const content = d.img ? `<img src="${d.img}" onclick="window.open('${d.img}')">` : d.m;
                b.innerHTML += `<div class="msg ${cls}">${d.bot?'':`<b>${d.s}:</b><br>`}${content}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    window.send = (type) => {
        const inp = document.getElementById(`msg-${type.replace('-','-')}`);
        if(!inp.value) return;
        if(type==='a-g' && inp.value.startsWith('/')) { cmd(inp.value); inp.value=""; return; }
        const path = type.includes('g') ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
        push(ref(db, path), {s:myU, m:inp.value}); inp.value = "";
    };

    window.upImg = (input, type) => {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const path = type.includes('g') ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
            push(ref(db, path), {s:myU, img: e.target.result});
        };
        reader.readAsDataURL(file);
    };

    window.setT = (u) => { curT = u; listen(`chats/private/${u}`, 'chat-a-p'); Swal.fire('OK',`Chat @${u} dibuka`,'success'); };

    // --- SPIN ---
    window.spin = async () => {
        if(q.length < 2) return;
        const i = Math.floor(Math.random() * q.length);
        const rot = (360 * 10) + (360 - (i * (360/q.length))) - ((360/q.length)/2);
        await set(ref(db, 'config/sync'), { r: rot, w: q[i].u, d: false });
        setTimeout(async () => {
            await update(ref(db, 'config/sync'), { d: true });
            push(ref(db, 'chats/global'), {bot:true, m:`🎉 @${q[i].u} MENANG SPIN!`});
            set(ref(db, `wins/${q[i].u}`), true);
            set(ref(db, `chats/private/${q[i].u}/init`), {s:"BOT", m:"Selamat! Kirim foto bukti klaim."});
            remove(ref(db, `queue/${q[i].k}`));
        }, 7100);
    };

    window.join = () => push(ref(db, 'queue'), {u:myU});
    window.setA = (v) => { document.getElementById('u-form').style.display=v?'none':'block'; document.getElementById('a-form').style.display=v?'block':'none'; };
    function draw(id, l) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        const n = l.length || 1; const a = (2*Math.PI)/n; ctx.clearRect(0,0,500,500);
        l.forEach((p, i) => {
            ctx.beginPath(); ctx.fillStyle = i%2===0 ? '#0d1117' : '#161b22'; ctx.moveTo(250,250); ctx.arc(250,250,240,i*a,(i+1)*a); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*a + a/2); ctx.fillStyle = "#00f2fe"; ctx.font = "bold 20px Arial"; ctx.textAlign="right"; ctx.fillText(p.u.substring(0,10), 230, 8); ctx.restore();
        });
    }
</script>
</body>
</html>
