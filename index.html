<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT SPIN - v1.0 RELEASE</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --neon: #38bdf8; --win: #4ade80; --danger: #fb7185; --bg: #020617; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: #f1f5f9;
            background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            background-attachment: fixed; overflow-x: hidden;
        }
        .container { max-width: 450px; margin: auto; padding: 15px; }
        .card { 
            background: rgba(255, 255, 255, 0.03); border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; 
            margin-bottom: 15px; backdrop-filter: blur(15px);
        }
        .btn { 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); 
            font-weight: 800; border-radius: 50px; transition: 0.3s; 
            text-transform: uppercase; font-size: 11px; display: flex; align-items: center; justify-content: center;
            letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-glass { background: rgba(56, 189, 248, 0.15); color: var(--neon); box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        .btn-danger { background: rgba(251, 113, 133, 0.2); color: var(--danger); }
        .btn-win { background: rgba(74, 222, 128, 0.2); color: var(--win); }

        input { 
            width: 100%; padding: 15px 25px; border-radius: 50px; 
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; margin-bottom: 10px; font-size: 14px;
        }
        input:focus { border-color: var(--neon); }

        .chat-box { height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 15px; margin-bottom: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 13px; line-height: 1.4; position: relative; }
        .msg-me { align-self: flex-end; background: var(--neon); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }
        .msg-bot { width: 100%; text-align: center; color: var(--win); font-weight: bold; font-style: italic; background: transparent; border: 1px dashed var(--win); }

        .wheel-wrap { position: relative; width: 250px; height: 250px; margin: 20px auto; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid rgba(255,255,255,0.05); transition: 8s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 20; filter: drop-shadow(0 0 5px var(--neon)); }

        /* FIX: Z-Index diatur supaya Swal (notif) bisa muncul di depan login */
        #pg-login { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9000; 
            display: flex; align-items: center; justify-content: center; 
            overflow-y: auto; padding: 20px;
        }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="pg-login">
    <div style="width: 100%; max-width: 320px; text-align: center;">
        <h1 style="letter-spacing: 8px; color: #fff; margin-bottom: 5px; font-weight: 900;">ZMT</h1>
        <p style="color: var(--neon); font-size: 10px; letter-spacing: 3px; margin-bottom: 30px;">VERSION 1.0 RELEASE</p>
        <div class="card">
            <div id="box-user">
                <input type="text" id="in-u" placeholder="Username">
                <input type="password" id="in-p" placeholder="Password">
                <button class="btn btn-glass" style="width:100%; padding:18px;" onclick="handleAuth('user')">LOGIN / REGISTER</button>
                <div style="margin-top: 25px; opacity: 0.3; font-size: 10px;" onclick="switchAuth(true)">ADMIN ACCESS</div>
            </div>
            <div id="box-admin" style="display:none;">
                <input type="password" id="in-akey" placeholder="Admin Key">
                <button class="btn btn-danger" style="width:100%; padding:18px;" onclick="handleAuth('admin')">ADMIN LOGIN</button>
                <div style="margin-top: 25px; opacity: 0.3; font-size: 10px;" onclick="switchAuth(false)">BACK TO USER</div>
            </div>
        </div>
    </div>
</div>

<div id="pg-main" style="display:none;">
    <div style="padding:15px 20px; display:flex; justify-content:space-between; align-items:center; background:rgba(2,6,23,0.95); backdrop-filter:blur(10px); position:sticky; top:0; z-index:1000; border-bottom:1px solid rgba(255,255,255,0.1);">
        <span id="label-u" style="font-weight:900; color:var(--neon); font-size:14px; text-transform:uppercase;"></span>
        <button class="btn btn-danger" onclick="location.reload()" style="padding:7px 15px; font-size:10px;">LOGOUT</button>
    </div>

    <div class="container">
        <div id="section-admin" style="display:none;">
            <div class="card">
                <h3 style="margin-top:0; font-size:12px; color:var(--danger)">DATABASE CONTROL</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button id="btn-reg" class="btn" style="flex:1;" onclick="toggleReg()">REGIS: ...</button>
                    <button class="btn btn-danger" style="flex:2;" onclick="fullWipe()">HAPUS SEMUA DATA</button>
                </div>
                <div id="list-users" style="max-height:250px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:15px; padding:5px;"></div>
            </div>

            <div class="card">
                <h3 style="margin-top:0; font-size:12px; color:var(--neon)">GLOBAL CONTROL & CHAT</h3>
                <div class="chat-box" id="adm-chat-global"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="adm-in-global" placeholder="/crash @user atau pesan..." style="margin:0;">
                    <button class="btn btn-glass" onclick="sendMessage('global', 'admin')" style="padding:0 20px;">SEND</button>
                </div>
            </div>

            <div class="card" style="text-align:center;">
                <div class="wheel-wrap"><div class="pointer"></div><canvas id="canvas-admin" width="500" height="500"></canvas></div>
                <button class="btn btn-win" style="width:100%; padding:20px; font-size:14px;" onclick="executeSpin()">MULAI SPIN</button>
            </div>

            <div class="card">
                <h3 style="margin-top:0; font-size:12px; color:var(--win)">PRIVATE CHAT CLAIM</h3>
                <div id="winner-tabs" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.1);"></div>
                <div class="chat-box" id="adm-chat-private"></div>
                <div style="display:flex; gap:8px;">
                    <label class="btn btn-glass" style="width:50px; padding:0; font-size:20px;">📷<input type="file" hidden accept="image/*" onchange="uploadImage(this, 'private', 'admin')"></label>
                    <input type="text" id="adm-in-private" placeholder="Balas klaim..." style="margin:0;">
                    <button class="btn btn-glass" onclick="sendMessage('private', 'admin')" style="padding:0 20px;">SEND</button>
                </div>
            </div>
        </div>

        <div id="section-user" style="display:none;">
            <div class="card" style="text-align:center;">
                <button id="btn-join" class="btn btn-glass" style="width:100%; padding:25px; font-size:16px;" onclick="joinQueue()">DAFTAR SPIN SEKARANG</button>
                <div class="wheel-wrap"><div class="pointer"></div><canvas id="canvas-user" width="500" height="500"></canvas></div>
            </div>

            <div class="card">
                <h3 style="margin-top:0; font-size:12px; color:var(--neon)">🌐 GLOBAL CHAT</h3>
                <div class="chat-box" id="usr-chat-global"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="usr-in-global" placeholder="Tulis pesan..." style="margin:0;">
                    <button class="btn btn-glass" onclick="sendMessage('global', 'user')" style="padding:0 20px;">SEND</button>
                </div>
            </div>

            <div id="claim-room" class="card" style="display:none; border:2px solid var(--win); background: rgba(74, 222, 128, 0.05);">
                <h3 style="margin-top:0; font-size:12px; color:var(--win)">🎁 CHAT KLAIM HADIAH</h3>
                <div class="chat-box" id="usr-chat-private"></div>
                <div style="display:flex; gap:8px;">
                    <label class="btn btn-win" style="width:50px; padding:0; font-size:20px;">📷<input type="file" hidden accept="image/*" onchange="uploadImage(this, 'private', 'user')"></label>
                    <input type="text" id="usr-in-private" placeholder="Kirim bukti/foto..." style="margin:0;">
                    <button class="btn btn-win" onclick="sendMessage('private', 'user')" style="padding:0 20px;">KIRIM</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqTm0G0UR-UA-GzqWjHXWFNiJoVeg5Krk",
        authDomain: "zmtspin.firebaseapp.com",
        databaseURL: "https://zmtspin-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "zmtspin",
        storageBucket: "zmtspin.firebasestorage.app",
        messagingSenderId: "305119744319",
        appId: "1:305119744319:web:2cc44fd4dbf785cf3c838a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUsername = "";
    let userRole = "";
    let isRegOpen = true;
    let selectedPrivateUser = "";
    let loginTime = Date.now();

    // CEK PERSISTENCE NOTIFIKASI (PAS REFRESH)
    window.onload = () => {
        const kickMsg = localStorage.getItem('zmt_msg');
        if (kickMsg) {
            Swal.fire('INFORMATION', kickMsg, 'info');
            localStorage.removeItem('zmt_msg');
        }
    };

    window.switchAuth = (isAdmin) => {
        document.getElementById('box-user').style.display = isAdmin ? 'none' : 'block';
        document.getElementById('box-admin').style.display = isAdmin ? 'block' : 'none';
    };

    window.handleAuth = async (role) => {
        if (role === 'admin') {
            const key = document.getElementById('in-akey').value;
            if (key === "zmtxxx") {
                currentUsername = "ADMIN";
                userRole = "admin";
                launchApp();
            } else {
                Swal.fire({ title: 'ERROR', text: 'Admin Key Salah!', icon: 'error', target: 'body' });
            }
            return;
        }

        const u = document.getElementById('in-u').value.trim().toLowerCase();
        const p = document.getElementById('in-p').value;

        if (u.length < 3 || p.length < 3) {
            Swal.fire({ title: 'WARNING', text: 'User/PW minimal 3 karakter!', icon: 'warning', target: 'body' });
            return;
        }

        const userRef = ref(db, `auth/users/${u}`);
        const snap = await get(userRef);

        if (snap.exists()) {
            const userData = snap.val();
            if (userData.pw === p) {
                currentUsername = u;
                userRole = "user";
                launchApp();
            } else {
                Swal.fire({ title: 'ERROR', text: 'Password Salah!', icon: 'error', target: 'body' });
            }
        } else {
            const regStatus = await get(ref(db, 'config/regOpen'));
            if (regStatus.exists() && regStatus.val() === false) {
                Swal.fire({ title: 'CLOSED', text: 'Pendaftaran sedang ditutup Admin!', icon: 'info', target: 'body' });
                return;
            }
            await set(userRef, { pw: p, crash: false, created: Date.now() });
            currentUsername = u;
            userRole = "user";
            launchApp();
        }
    };

    function launchApp() {
        document.getElementById('pg-login').style.display = 'none';
        document.getElementById('pg-main').style.display = 'block';
        document.getElementById('label-u').innerText = currentUsername;

        // FIX: Sinyal Wipe agar user dapet notif kenapa dia kelempar
        onValue(ref(db, 'config/wipeSignal'), (s) => {
            if (s.exists() && s.val() > loginTime && userRole !== 'admin') {
                localStorage.setItem('zmt_msg', 'DATABASE TELAH DIHAPUS OLEH ADMIN!');
                location.reload(); 
            }
        });

        if (userRole === 'admin') {
            document.getElementById('section-admin').style.display = 'block';
            initAdminEngine();
        } else {
            document.getElementById('section-user').style.display = 'block';
            initUserEngine();
        }
    }

    function initAdminEngine() {
        onValue(ref(db, 'config/regOpen'), (s) => {
            isRegOpen = s.val() !== false;
            const b = document.getElementById('btn-reg');
            b.innerText = isRegOpen ? "REGIS: OPEN" : "REGIS: CLOSED";
            b.className = isRegOpen ? "btn btn-win" : "btn btn-danger";
        });

        onValue(ref(db, 'auth/users'), (s) => {
            const container = document.getElementById('list-users');
            container.innerHTML = "";
            if (!s.exists()) return;
            s.forEach((child) => {
                const u = child.key;
                const d = child.val();
                container.innerHTML += `
                    <div class="user-item">
                        <div style="font-size:12px;">
                            <b>@${u}</b><br>
                            <span style="color:var(--win)">PW: ${d.pw}</span>
                        </div>
                        <button class="btn btn-danger" style="padding:5px 10px; font-size:9px;" onclick="executeCommand('/crash @${u}')">CRASH</button>
                    </div>
                `;
            });
        });

        onValue(ref(db, 'queue'), (s) => {
            let list = [];
            s.forEach(c => { list.push({u: c.val().u}); });
            drawWheel('canvas-admin', list);
        });

        onValue(ref(db, 'winners'), (s) => {
            const tabs = document.getElementById('winner-tabs');
            tabs.innerHTML = "";
            if (!s.exists()) return;
            s.forEach(c => {
                const name = c.key;
                const activeStyle = selectedPrivateUser === name ? 'border:1px solid var(--neon); background:rgba(56,189,248,0.2)' : '';
                tabs.innerHTML += `<button class="btn" style="padding:8px 15px; white-space:nowrap; ${activeStyle}" onclick="selectWinnerChat('${name}')">@${name}</button>`;
            });
        });

        listenChat('chats/global', 'adm-chat-global');
    }

    window.toggleReg = () => set(ref(db, 'config/regOpen'), !isRegOpen);

    window.fullWipe = () => {
        Swal.fire({
            title: 'HAPUS TOTAL?',
            text: "Semua data akan dihapus permanen!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'YA!'
        }).then((result) => {
            if (result.isConfirmed) {
                set(ref(db, 'config/wipeSignal'), Date.now()).then(() => {
                    setTimeout(() => {
                        remove(ref(db)).then(() => {
                            set(ref(db, 'config'), { regOpen: true, wipeSignal: Date.now() });
                            location.reload();
                        });
                    }, 500);
                });
            }
        });
    };

    window.selectWinnerChat = (u) => {
        selectedPrivateUser = u;
        listenChat(`chats/private/${u}`, 'adm-chat-private');
    };

    function initUserEngine() {
        onValue(ref(db, `auth/users/${currentUsername}/crash`), (s) => {
            if (s.val() === true) {
                localStorage.setItem('zmt_msg', 'KAMU TELAH DI-CRASH OLEH ADMIN!');
                document.body.innerHTML = "<div style='background:#000;color:red;height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;'><h1>YOU ARE CRASHED</h1></div>";
                setTimeout(() => { location.reload(); }, 2000);
            }
        });

        onValue(ref(db, 'queue'), (s) => {
            let list = [];
            s.forEach(c => { list.push({u: c.val().u}); });
            drawWheel('canvas-user', list);
        });

        onValue(ref(db, 'config/syncSpin'), (s) => {
            const data = s.val();
            if (!data) return;
            document.getElementById('canvas-user').style.transform = `rotate(${data.rotation}deg)`;
            if (data.isDone) {
                if (data.winner === currentUsername) {
                    confetti();
                    Swal.fire('WINNER!', 'Selamat! Kamu menang, segera klaim hadiah!', 'success');
                    document.getElementById('claim-room').style.display = 'block';
                    listenChat(`chats/private/${currentUsername}`, 'usr-chat-private');
                } else {
                    Swal.fire('INFO', `Spin Selesai! Pemenangnya adalah @${data.winner}`, 'info');
                }
            }
        });

        listenChat('chats/global', 'usr-chat-global');
    }

    window.joinQueue = () => set(ref(db, `queue/${currentUsername}`), { u: currentUsername });

    window.executeCommand = async (cmd) => {
        const parts = cmd.split(' ');
        const action = parts[0].toLowerCase();
        const target = parts[1]?.replace('@', '');
        if (action === '/crash' && target) {
            await update(ref(db, `auth/users/${target}`), { crash: true });
            Swal.fire('DONE', `@${target} Berhasil di Crash!`, 'success');
        }
    };

    function listenChat(path, elementId) {
        onValue(ref(db, path), (s) => {
            const box = document.getElementById(elementId);
            box.innerHTML = "";
            if (!s.exists()) return;
            s.forEach(child => {
                const d = child.val();
                const isMe = d.sender === currentUsername;
                const typeClass = d.isBot ? 'msg-bot' : (isMe ? 'msg-me' : 'msg-other');
                const content = d.image ? `<img src="${d.image}" style="max-width:100%; border-radius:10px;">` : d.text;
                box.innerHTML += `<div class="msg ${typeClass}"><b>@${d.sender}</b><br>${content}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.sendMessage = (type, role) => {
        const inputId = `${role === 'admin' ? 'adm' : 'usr'}-in-${type}`;
        const input = document.getElementById(inputId);
        const val = input.value.trim();
        if (!val) return;
        const target = (role === 'admin') ? selectedPrivateUser : currentUsername;
        if (type === 'private' && !target) {
            Swal.fire('PILIH USER', 'Pilih pemenang dulu di tab atas!', 'warning');
            return;
        }
        const path = type === 'global' ? 'chats/global' : `chats/private/${target}`;
        push(ref(db, path), { sender: currentUsername, text: val, time: Date.now() });
        input.value = "";
    };

    window.uploadImage = (input, type, role) => {
        const file = input.files[0];
        if (!file || file.size > 15728640) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const target = (role === 'admin') ? selectedPrivateUser : currentUsername;
            const path = type === 'global' ? 'chats/global' : `chats/private/${target}`;
            push(ref(db, path), { sender: currentUsername, image: e.target.result, time: Date.now() });
        };
        reader.readAsDataURL(file);
    };

    window.executeSpin = async () => {
        const snap = await get(ref(db, 'queue'));
        if (!snap.exists()) return;
        const participants = [];
        snap.forEach(c => { participants.push(c.val().u); });
        const winIndex = Math.floor(Math.random() * participants.length);
        const winnerName = participants[winIndex];
        const finalRotation = (360 * 10) + (360 - (winIndex * (360/participants.length))) - (180/participants.length);
        
        await set(ref(db, 'config/syncSpin'), { rotation: finalRotation, winner: winnerName, isDone: false });
        document.getElementById('canvas-admin').style.transform = `rotate(${finalRotation}deg)`;

        setTimeout(async () => {
            await update(ref(db, 'config/syncSpin'), { isDone: true });
            await set(ref(db, `winners/${winnerName}`), { winAt: Date.now() });
            remove(ref(db, `queue/${winnerName}`));
            Swal.fire('SUCCESS', `Pemenang adalah @${winnerName}`, 'success');
        }, 8100);
    };

    function drawWheel(canvasId, list) {
        const c = document.getElementById(canvasId);
        const ctx = c.getContext('2d');
        const count = list.length || 1;
        const arc = (2 * Math.PI) / count;
        ctx.clearRect(0,0,500,500);
        for (let i = 0; i < count; i++) {
            ctx.beginPath();
            ctx.fillStyle = i % 2 ? '#0f172a' : '#1e293b';
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 240, i*arc, (i+1)*arc);
            ctx.fill();
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(i*arc + arc/2);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 18px Arial";
            ctx.fillText((list[i] ? list[i].u : "ZMT").toUpperCase(), 100, 10);
            ctx.restore();
        }
    }
</script>

</body>
</html>
